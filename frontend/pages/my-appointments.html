<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedScribe — Appointments</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <span style="color:var(--slate)">Health Portal</span>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span>Patient</span>
      </div>
      <button class="profile-menu-item" onclick="openChangePasswordModal()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        Change Password
      </button>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign out
      </button>
    </div>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <nav class="sidebar">
      <div class="sidebar-section-label" style="display:flex;justify-content:space-between;align-items:center">
        <span id="sidebar-doctor-name"></span>
        <button class="btn btn-outline btn-sm sidebar-signout-btn" onclick="logout()">Sign out</button>
      </div>
      <div class="sidebar-section-label">Navigation</div>
      <a class="nav-item" href="my-health.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        My Records
      </a>
      <a class="nav-item" href="my-hospitals.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2M5 21h2m0 0h10M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 8v-4h4v4"/></svg>
        Hospitals
      </a>
      <a class="nav-item active" href="my-appointments.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Appointments
      </a>
    </nav>

    <nav class="bottom-nav">
      <button class="bottom-nav-item" data-page="records" onclick="location.href='my-health.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Records
      </button>
      <button class="bottom-nav-item" data-page="hospitals" onclick="location.href='my-hospitals.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2M5 21h2m0 0h10"/></svg>
        Hospitals
      </button>
      <button class="bottom-nav-item active" data-page="appointments" onclick="location.href='my-appointments.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Book
      </button>
    </nav>

    <main class="main-content">
      <div style="margin-bottom:20px">
        <h1>Appointments</h1>
        <p>Book an appointment or reserve your queue token from home.</p>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><h2>Book a New Appointment</h2></div>

        <div class="form-group">
          <label class="form-label">Hospital</label>
          <select class="form-control" id="book-hospital"></select>
        </div>

        <div class="form-group">
          <label class="form-label">Doctor (optional)</label>
          <select class="form-control" id="book-doctor"><option value="">Any available doctor</option></select>
        </div>

        <div class="appt-type-toggle">
          <div class="appt-type-btn active" id="type-scheduled" onclick="setApptType('scheduled')">Book for later</div>
          <div class="appt-type-btn" id="type-queue_home" onclick="setApptType('queue_home')">Queue from home (today)</div>
        </div>

        <div class="form-group" id="datetime-group">
          <label class="form-label">Preferred Date &amp; Time</label>
          <input class="form-control" id="book-datetime" type="datetime-local" />
        </div>

        <div class="form-group">
          <label class="form-label">Notes (optional)</label>
          <input class="form-control" id="book-notes" placeholder="Reason for visit, symptoms, etc." />
        </div>

        <div class="err-msg" id="book-err"></div>
        <button class="btn btn-primary" id="btn-book" onclick="bookAppointment()">Book Appointment</button>
      </div>

      <div class="card">
        <div class="card-header"><h2>My Appointments</h2></div>
        <div id="appt-list"><p>Loading...</p></div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (!requireAuth()) { }
    if (getDoctor()?.role !== 'patient') redirectByRole(getDoctor()?.role);
    fillTopbar();
    document.getElementById("profile-menu-name").textContent = getDoctor()?.name || "Patient";

    let currentType = "scheduled";
    const params = new URLSearchParams(window.location.search);
    const presetHospitalId = params.get("hospital_id");

    function setApptType(type) {
      currentType = type;
      document.getElementById("type-scheduled").classList.toggle("active", type === "scheduled");
      document.getElementById("type-queue_home").classList.toggle("active", type === "queue_home");
      document.getElementById("datetime-group").style.display = type === "queue_home" ? "none" : "block";
    }

    async function loadHospitalOptions() {
      const sel = document.getElementById("book-hospital");
      try {
        const hospitals = await api("GET", "/portal/hospitals");
        sel.innerHTML = hospitals.map(h => `<option value="${h.id}">${sanitize(h.name)}</option>`).join('');
        if (presetHospitalId) sel.value = presetHospitalId;
        loadDoctorOptions();
      } catch (e) {
        sel.innerHTML = `<option value="">Failed to load hospitals</option>`;
      }
    }

    async function loadDoctorOptions() {
      const hospitalId = document.getElementById("book-hospital").value;
      const sel = document.getElementById("book-doctor");
      sel.innerHTML = `<option value="">Any available doctor</option>`;
      if (!hospitalId) return;
      try {
        const doctors = await api("GET", `/portal/hospitals/${hospitalId}/doctors`);
        doctors.forEach(d => {
          sel.innerHTML += `<option value="${d.id}">${sanitize(d.name)}${d.specialization ? ' — ' + sanitize(d.specialization) : ''}</option>`;
        });
      } catch (e) { /* silent — doctor list is optional */ }
    }

    document.getElementById("book-hospital").addEventListener("change", loadDoctorOptions);

    async function bookAppointment() {
      const err = document.getElementById("book-err");
      err.textContent = "";
      const hospitalId = document.getElementById("book-hospital").value;
      const doctorId = document.getElementById("book-doctor").value;
      const notes = document.getElementById("book-notes").value.trim();

      if (!hospitalId) { err.textContent = "Select a hospital"; return; }

      let requestedTime;
      if (currentType === "queue_home") {
        requestedTime = new Date().toISOString();
      } else {
        const dtVal = document.getElementById("book-datetime").value;
        if (!dtVal) { err.textContent = "Select a date and time"; return; }
        requestedTime = new Date(dtVal).toISOString();
      }

      const btn = document.getElementById("btn-book");
      btn.disabled = true;
      try {
        await api("POST", "/portal/appointments", {
          hospital_id: parseInt(hospitalId),
          doctor_id: doctorId ? parseInt(doctorId) : null,
          type: currentType,
          requested_time: requestedTime,
          notes: notes || null
        });
        toast(currentType === "queue_home" ? "Token reserved for today" : "Appointment booked", "success");
        document.getElementById("book-notes").value = "";
        loadAppointments();
      } catch (e) {
        err.textContent = e.message;
      } finally {
        btn.disabled = false;
      }
    }

    async function loadAppointments() {
      const list = document.getElementById("appt-list");
      try {
        const appts = await api("GET", "/portal/appointments");
        if (!appts.length) { list.innerHTML = `<p style="color:var(--slate-light)">No appointments yet.</p>`; return; }

        const badgeClass = { booked: "badge-teal", confirmed: "badge-navy", completed: "badge-green", cancelled: "badge-grey", no_show: "badge-red" };

        list.innerHTML = appts.map(a => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
            <div>
              <div style="font-weight:500">${sanitize(a.hospital_name || 'Hospital')} ${a.type === 'queue_home' ? '· Queue from home' : ''}</div>
              <div style="font-size:12px;color:var(--slate-light)">${new Date(a.requested_time).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <span class="badge ${badgeClass[a.status] || 'badge-grey'}">${a.status}</span>
              ${a.status === 'booked' || a.status === 'confirmed' ? `<button class="btn btn-outline btn-sm" onclick="cancelAppt(${a.id})">Cancel</button>` : ''}
            </div>
          </div>`).join('');
      } catch (e) {
        list.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`;
      }
    }

    async function cancelAppt(id) {
      try {
        await api("POST", `/portal/appointments/${id}/cancel`);
        toast("Appointment cancelled", "success");
        loadAppointments();
      } catch (e) {
        toast(e.message, "error");
      }
    }

    loadHospitalOptions();
    loadAppointments();
  </script>
</body>

</html>
