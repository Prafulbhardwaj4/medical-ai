    <main class="main-content">
      <div class="card">
        <div class="card-header"><h2>Rooms</h2></div>
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:20px;max-width:560px">
          <input class="form-control" id="room-name" placeholder="Name (e.g. OPD, Emergency)" />
          <input class="form-control" id="room-number" placeholder="Number (e.g. 101, optional)" />
          <button class="btn btn-primary" onclick="addRoom()">Add</button>
        </div>
        <p style="color:var(--slate);font-size:13px;margin-bottom:20px">Both fields are optional — fill whichever applies. Displayed as: General OPD (101)</p>
        <div id="rooms-list"><p style="color:var(--slate)">Loading…</p></div>
      </div>

  <div id="toast"></div>
  <script src="../js/api.js?v=3"></script>
  <script>
    const doc = getDoctor();
    if (!doc || !["admin", "sub_admin"].includes(doc.role)) window.location.href = "dashboard.html";
    if (!requireAuth()) throw new Error("Not authenticated");
    fillTopbar();

    if (doc?.billing_enabled) document.getElementById('rooms-billing-link').style.display = '';

    async function loadRooms() {
      try {
        const rooms = await api("GET", "/admin/rooms");
        document.getElementById('rooms-list').innerHTML = rooms.length ? rooms.map(r => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
            <strong>${r.display || r.name}</strong>
            ${r.room_number || r.name ? `<span style="font-size:12px;color:var(--slate);margin-left:8px">${r.room_number ? 'No. ' + r.room_number : ''}${r.room_number && r.name ? ' · ' : ''}${r.name || ''}</span>` : ''}
            <button class="btn btn-outline btn-sm" onclick="deleteRoom(${r.id})">Delete</button>
          </div>
        `).join('') : '<p style="color:var(--slate-light);padding:12px 0">No rooms added yet.</p>';
      } catch (e) { toast(e.message, "error"); }
    }

    async function addRoom() {
      const name = document.getElementById('room-name').value.trim();
      const number = document.getElementById('room-number').value.trim();
      if (!name && !number) { toast('Enter at least a name or number.', 'error'); return; }
      try {
        const params = new URLSearchParams();
        if (name) params.append('name', name);
        if (number) params.append('room_number', number);
        await api("POST", `/admin/rooms?${params.toString()}`);
        document.getElementById('room-name').value = '';
        document.getElementById('room-number').value = '';
        toast('Room added.', 'success');
        loadRooms();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function deleteRoom(id) {
      try {
        await api("DELETE", `/admin/rooms/${id}`);
        toast('Room removed.', 'success');
        loadRooms();
      } catch (e) { toast(e.message, 'error'); }
    }

    loadRooms();
  </script>
