<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedScribe — My Availability</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span id="profile-menu-clinic"></span>
      </div>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign out
      </button>
    </div>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <nav class="sidebar">
      <div class="sidebar-section-label" style="display:flex;justify-content:space-between;align-items:center">
        <span id="sidebar-doctor-name"></span>
        <button class="btn btn-outline btn-sm sidebar-signout-btn" onclick="logout()">Sign out</button>
      </div>
      <div class="sidebar-section-label">Navigation</div>
      <a class="nav-item" href="dashboard.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a class="nav-item active" href="doctor-slots.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        My Availability
      </a>
    </nav>

    <nav class="bottom-nav">
      <button class="bottom-nav-item active" data-page="slots" onclick="location.href='doctor-slots.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Slots
      </button>
      <button class="bottom-nav-item" data-page="dashboard" onclick="location.href='dashboard.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"/></svg>
        Dashboard
      </button>
    </nav>

    <main class="main-content">
      <div style="margin-bottom:20px">
        <h1>My Availability</h1>
        <p>Set the time slots patients can book through the Health Portal.</p>
      </div>

      <div class="card" style="margin-bottom:20px" id="doctor-picker-card" style="display:none">
        <div class="form-group" style="max-width:320px">
          <label class="form-label">Doctor</label>
          <select class="form-control" id="pick-doctor"></select>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><h2>Add Slots</h2></div>
        <div class="form-group" style="max-width:220px">
          <label class="form-label">Date</label>
          <input class="form-control" type="date" id="slot-date" />
        </div>

        <div id="period-inputs">
          ${''}
        </div>

        <div class="err-msg" id="gen-err"></div>
        <button class="btn btn-primary" onclick="generateSlots()">Add Slots</button>
      </div>

      <div class="card">
        <div class="card-header"><h2>Slots for Selected Date</h2></div>
        <div id="slot-list"><p style="color:var(--slate-light)">Pick a date above.</p></div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (!requireAuth()) { }
    fillTopbar();
    const doc = getDoctor();
    const isManager = ['admin', 'sub_admin', 'super_admin'].includes(doc?.role);
    document.getElementById("profile-menu-name").textContent = `${doc?.title || ''} ${doc?.name || ''}`.trim();

    let targetDoctorId = doc?.role === 'doctor' ? doc.id : null;

    function buildPeriodInputs() {
      const periods = [["morning", "Morning"], ["afternoon", "Afternoon"], ["evening", "Evening"]];
      document.getElementById("period-inputs").innerHTML = periods.map(([key, label]) => `
        <div class="form-group">
          <label class="form-label">${label} Times (comma-separated, 24h format e.g. 09:00, 09:30, 10:00)</label>
          <input class="form-control" id="times-${key}" placeholder="e.g. 09:00, 09:30, 10:00" />
        </div>`).join('');
    }
    buildPeriodInputs();

    async function initDoctorPicker() {
      if (!isManager) return;
      document.getElementById("doctor-picker-card").style.display = "block";
      try {
        // Reuses the existing hospital-side doctor list — assumes GET /doctors exists on hospital side already
        const res = await fetch(`${BASE}/doctors`, { headers: { Authorization: `Bearer ${getToken()}` } });
        const doctors = await res.json();
        const sel = document.getElementById("pick-doctor");
        sel.innerHTML = doctors.filter(d => d.role === 'doctor').map(d => `<option value="${d.id}">${d.title} ${d.name}</option>`).join('');
        targetDoctorId = sel.value ? parseInt(sel.value) : null;
        sel.addEventListener("change", () => { targetDoctorId = parseInt(sel.value); loadSlots(); });
      } catch (e) {
        document.getElementById("doctor-picker-card").innerHTML = `<p class="err-msg" style="display:block">Could not load doctor list.</p>`;
      }
    }

    async function generateSlots() {
      const err = document.getElementById("gen-err");
      err.textContent = "";
      const date = document.getElementById("slot-date").value;
      if (!date) { err.textContent = "Pick a date first"; return; }

      const parseTimes = (id) => document.getElementById(id).value.split(',').map(t => t.trim()).filter(Boolean);
      const payload = {
        doctor_id: targetDoctorId,
        date,
        morning_times: parseTimes("times-morning"),
        afternoon_times: parseTimes("times-afternoon"),
        evening_times: parseTimes("times-evening"),
      };

      if (!payload.morning_times.length && !payload.afternoon_times.length && !payload.evening_times.length) {
        err.textContent = "Enter at least one time slot";
        return;
      }

      try {
        await api("POST", "/doctor-slots/generate", payload);
        toast("Slots added", "success");
        ["times-morning", "times-afternoon", "times-evening"].forEach(id => document.getElementById(id).value = "");
        loadSlots();
      } catch (e) {
        err.textContent = e.message;
      }
    }

    async function loadSlots() {
      const date = document.getElementById("slot-date").value;
      const list = document.getElementById("slot-list");
      if (!date || !targetDoctorId) { list.innerHTML = `<p style="color:var(--slate-light)">Pick a date above.</p>`; return; }

      list.innerHTML = `<p>Loading...</p>`;
      try {
        const qs = isManager ? `?doctor_id=${targetDoctorId}&date=${date}` : `?date=${date}`;
        const slots = await api("GET", `/doctor-slots/mine${qs}`);
        if (!slots.length) { list.innerHTML = `<p style="color:var(--slate-light)">No slots added for this date yet.</p>`; return; }

        list.innerHTML = slots.map(s => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
            <span>${s.slot_time} <span class="badge badge-grey" style="margin-left:8px">${s.period}</span></span>
            <span style="display:flex;align-items:center;gap:8px">
              <span class="badge ${s.is_booked ? 'badge-green' : 'badge-teal'}">${s.is_booked ? 'Booked' : 'Available'}</span>
              ${!s.is_booked ? `<button class="btn btn-outline btn-sm" onclick="deleteSlot(${s.id})">Remove</button>` : ''}
            </span>
          </div>`).join('');
      } catch (e) {
        list.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`;
      }
    }

    async function deleteSlot(id) {
      try {
        await api("DELETE", `/doctor-slots/${id}`);
        toast("Slot removed", "success");
        loadSlots();
      } catch (e) { toast(e.message, "error"); }
    }

    document.getElementById("slot-date").addEventListener("change", loadSlots);
    initDoctorPicker();
  </script>
</body>

</html>
