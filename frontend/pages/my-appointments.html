<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedScribe — Appointments</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .wizard-topbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }
    .wizard-back-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--teal-subtle); color: var(--teal); border: none;
      padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .wizard-back-btn:hover { opacity: .85; }
    .wizard-step-title { font-size: 1.05rem; font-weight: 700; color: var(--navy); }
    .wizard-step-sub { font-size: 12.5px; color: var(--slate-light); margin-top: 2px; }

    .select-row-card {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 18px; border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 10px; cursor: pointer; background: var(--white);
      transition: box-shadow .15s, border-color .15s;
    }
    .select-row-card:hover { box-shadow: var(--shadow-sm); border-color: var(--teal); }
    .select-row-card .src-name { font-weight: 700; color: var(--navy); font-size: 15px; }
    .select-row-card .src-sub { font-size: 12.5px; color: var(--slate); margin-top: 3px; }

    .btn-teal { background: var(--teal); color: #fff; border: none; }
    .btn-teal:hover { opacity: .9; }

    .date-scroll-wrap { margin-top: 4px; }
    .date-month-label { font-size: 13px; font-weight: 700; color: var(--slate); margin-bottom: 8px; }
    .date-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; scroll-snap-type: x proximity; }
    .date-pill {
      flex: 0 0 auto; width: 54px; text-align: center; padding: 10px 0;
      border: 1.5px solid var(--border); border-radius: 11px; cursor: pointer; scroll-snap-align: start;
      background: var(--white);
    }
    .date-pill .dnum { font-size: 1.05rem; font-weight: 700; color: var(--navy); }
    .date-pill .dabbr { font-size: 10.5px; color: var(--slate-light); margin-top: 2px; text-transform: uppercase; }
    .date-pill.selected { background: var(--teal); border-color: var(--teal); }
    .date-pill.selected .dnum, .date-pill.selected .dabbr { color: #fff; }

    .slot-period-title { font-size: 13.5px; font-weight: 700; color: var(--slate); margin: 18px 0 10px; }
    .slot-grid { display: flex; flex-wrap: wrap; gap: 9px; }
    .slot-chip {
      padding: 9px 14px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1.5px solid transparent; display: flex; align-items: center; gap: 6px;
    }
    .slot-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
    .slot-chip.green { background: #e8f8f0; color: #16794f; }
    .slot-chip.green .dot { background: #16a34a; }
    .slot-chip.yellow { background: #fff8e6; color: #92650a; }
    .slot-chip.yellow .dot { background: #eab308; }
    .slot-chip.red { background: #fdecec; color: #b91c1c; cursor: not-allowed; opacity: .75; }
    .slot-chip.red .dot { background: #dc2626; }
    .slot-chip:not(.red):hover { border-color: currentColor; }
    .slot-chip.placeholder { background: #f2f4f6; color: var(--slate-light); cursor: pointer; }
    .slot-chip.placeholder .dot { background: #cbd3da; }

    .pay-summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .pay-method-tabs { display: flex; gap: 8px; margin: 16px 0; }
    .pay-method-tab { flex: 1; text-align: center; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 13.5px; font-weight: 600; color: var(--slate); }
    .pay-method-tab.active { border-color: var(--teal); background: var(--teal-subtle); color: var(--teal); }
  </style>
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span>Patient</span>
      </div>
      <button class="profile-menu-item" onclick="openChangePasswordModal()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        Change Password
      </button>
      <button class="profile-menu-item danger" onclick="confirmDeactivateAccount()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
        Deactivate Account
      </button>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign out
      </button>
    </div>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <nav class="sidebar">
      <div class="sidebar-section-label" style="display:flex;justify-content:space-between;align-items:center">
        <span id="sidebar-doctor-name"></span>
        <button class="btn btn-outline btn-sm sidebar-signout-btn" onclick="logout()">Sign out</button>
      </div>
      <div class="sidebar-section-label">Navigation</div>
      <a class="nav-item" href="my-health.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Home
      </a>
      <a class="nav-item active" href="my-appointments.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Appointments
      </a>
    </nav>

    <nav class="bottom-nav">
      <button class="bottom-nav-item" onclick="location.href='my-health.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"/></svg>
        Home
      </button>
      <button class="bottom-nav-item" onclick="location.href='my-health.html?tab=records'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Records
      </button>
      <button class="bottom-nav-item active" onclick="location.href='my-appointments.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Appointments
      </button>
    </nav>

    <main class="main-content">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px">
        <div>
          <h1>Book an Appointment</h1>
          <p style="color:var(--slate)">Find a hospital, pick a doctor, and choose a time that works for you.</p>
        </div>
        <button class="btn btn-teal" onclick="openMyAppointmentsModal()">My Appointments</button>
      </div>

      <div class="card" id="wizard-card">
        <div class="wizard-topbar">
          <button class="wizard-back-btn" id="wizard-back" style="display:none" onclick="goBack()">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            Back
          </button>
          <div>
            <div class="wizard-step-title" id="wizard-title">Select State &amp; City</div>
            <div class="wizard-step-sub" id="wizard-sub"></div>
          </div>
        </div>
        <div id="wizard-area"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-confirm">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <h2>Confirm Appointment</h2>
        <button class="modal-close" onclick="closeConfirmModal()">&times;</button>
      </div>
      <p style="color:var(--slate);font-size:14px;margin-bottom:16px">Please confirm this is correct:</p>
      <div id="confirm-body"></div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn btn-outline" style="flex:1" onclick="closeConfirmModal()">Back</button>
        <button class="btn btn-primary" style="flex:1" id="btn-pay-book" onclick="proceedToPayment()">Pay and Book</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-my-appointments">
    <div class="modal" style="max-width:560px">
      <div class="modal-header">
        <h2>My Appointments</h2>
        <button class="modal-close" onclick="closeMyAppointmentsModal()">&times;</button>
      </div>
      <div id="appt-list"><p>Loading...</p></div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (!requireAuth()) { }
    if (getDoctor()?.role !== 'patient') redirectByRole(getDoctor()?.role);
    fillTopbar();
    document.getElementById("profile-menu-name").textContent = getDoctor()?.name || "Patient";

    const state = {
      step: "location",
      history: [],
      stateName: null, city: null,
      hospitalId: null, hospitalName: null,
      doctorId: null, doctorName: null, doctorFee: null,
      profileLinkId: null, profileName: null,
      date: null, dateLabel: null,
      slotId: null, slotTime: null,
      pendingAppointmentId: null
    };

    const STEP_META = {
      location: { title: "Select State & City", sub: "" },
      hospital: { title: "Select Hospital", sub: () => `${state.city}, ${state.stateName}` },
      doctor: { title: "Select Doctor", sub: () => state.hospitalName },
      profile: { title: "Who is this for?", sub: () => state.doctorName },
      datetime: { title: "Select Date and Time", sub: () => state.doctorName },
      payment: { title: "Payment", sub: () => "Complete payment to confirm your booking" },
    };

    function setStep(step, pushHistory = true) {
      if (pushHistory) state.history.push(state.step);
      state.step = step;
      updateHeader();
      renderStep();
    }
    function updateHeader() {
      const meta = STEP_META[state.step];
      document.getElementById("wizard-title").textContent = meta.title;
      document.getElementById("wizard-sub").textContent = typeof meta.sub === 'function' ? meta.sub() : meta.sub;
      document.getElementById("wizard-back").style.display = state.history.length ? "flex" : "none";
    }
    function goBack() {
      if (!state.history.length) return;
      state.step = state.history.pop();
      updateHeader();
      renderStep();
    }

    function searchableFullWidthList(container, items, renderItem, filterFn, searchPlaceholder) {
      container.innerHTML = `
        <input class="form-control" placeholder="${searchPlaceholder}" style="margin-bottom:14px" id="local-search" />
        <div id="local-list"></div>`;
      const listEl = container.querySelector('#local-list');
      const draw = (list) => { listEl.innerHTML = list.length ? list.map(renderItem).join('') : `<p style="color:var(--slate-light)">No results.</p>`; };
      draw(items);
      container.querySelector('#local-search').addEventListener('input', (e) => {
        draw(items.filter(i => filterFn(i, e.target.value.toLowerCase())));
      });
      return listEl;
    }

    async function renderStep() {
      const area = document.getElementById("wizard-area");

      if (state.step === "location") {
        area.innerHTML = `<p>Loading states...</p>`;
        try {
          const states = await api("GET", "/portal/hospitals/states");
          area.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              <div class="form-group" style="margin:0">
                <label class="form-label">State</label>
                <select class="form-control" id="pick-state">
                  <option value="">Select state...</option>
                  ${states.map(s => `<option value="${sanitize(s)}">${sanitize(s)}</option>`).join('')}
                </select>
              </div>
              <div class="form-group" style="margin:0">
                <label class="form-label">City</label>
                <select class="form-control" id="pick-city" disabled>
                  <option value="">Select state first</option>
                </select>
              </div>
            </div>`;

          document.getElementById("pick-state").addEventListener("change", async (e) => {
            const citySel = document.getElementById("pick-city");
            state.stateName = e.target.value;
            state.city = null;
            if (!e.target.value) { citySel.disabled = true; citySel.innerHTML = `<option value="">Select state first</option>`; return; }
            citySel.disabled = true;
            citySel.innerHTML = `<option value="">Loading...</option>`;
            const cities = await api("GET", `/portal/hospitals/cities?state=${encodeURIComponent(e.target.value)}`);
            citySel.disabled = false;
            citySel.innerHTML = `<option value="">Select city...</option>` + cities.map(c => `<option value="${sanitize(c)}">${sanitize(c)}</option>`).join('');
          });

          document.getElementById("pick-city").addEventListener("change", (e) => {
            if (!e.target.value) return;
            state.city = e.target.value;
            setStep("hospital");
          });
        } catch (e) { area.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`; }
        return;
      }

      if (state.step === "hospital") {
        area.innerHTML = `<p>Loading hospitals...</p>`;
        try {
          const hospitals = await api("GET", `/portal/hospitals?city=${encodeURIComponent(state.city)}&state=${encodeURIComponent(state.stateName)}`);
          if (!hospitals.length) { area.innerHTML = `<p style="color:var(--slate-light)">No hospitals found in ${sanitize(state.city)}.</p>`; return; }
          searchableFullWidthList(
            area, hospitals,
            (h) => `<div class="select-row-card" onclick='pickHospital(${h.id}, ${JSON.stringify(h.name)})'>
                      <div><div class="src-name">${sanitize(h.name)}</div>${h.address ? `<div class="src-sub">${sanitize(h.address)}</div>` : ''}</div>
                    </div>`,
            (h, q) => h.name.toLowerCase().includes(q),
            "Search hospitals..."
          );
        } catch (e) { area.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`; }
        return;
      }

      if (state.step === "doctor") {
        area.innerHTML = `<p>Loading doctors...</p>`;
        try {
          const doctors = await api("GET", `/portal/hospitals/${state.hospitalId}/doctors`);
          if (!doctors.length) { area.innerHTML = `<p style="color:var(--slate-light)">No doctors listed for this hospital yet.</p>`; return; }

          const specs = [...new Set(doctors.map(d => d.specialization).filter(Boolean))].sort();
          area.innerHTML = `
            <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">
              <input class="form-control" id="doc-search" placeholder="Search doctors..." style="flex:2;min-width:200px" />
              <select class="form-control" id="doc-spec-filter" style="flex:1;min-width:160px">
                <option value="">All specializations</option>
                ${specs.map(s => `<option value="${sanitize(s)}">${sanitize(s)}</option>`).join('')}
              </select>
            </div>
            <div id="doc-list"></div>`;

          const draw = () => {
            const q = document.getElementById("doc-search").value.toLowerCase();
            const spec = document.getElementById("doc-spec-filter").value;
            const filtered = doctors.filter(d =>
              (!spec || d.specialization === spec) &&
              (d.name.toLowerCase().includes(q) || (d.specialization || '').toLowerCase().includes(q))
            );
            document.getElementById("doc-list").innerHTML = filtered.length ? filtered.map(d => `
              <div class="select-row-card" onclick='pickDoctor(${d.id}, ${JSON.stringify(d.name)}, ${d.consultation_fee || 0})'>
                <div>
                  <div class="src-name">${sanitize(d.name)}</div>
                  <div class="src-sub">${sanitize(d.specialization || 'General')}${d.room_number ? ' · Room ' + sanitize(d.room_number) : ''}</div>
                </div>
                <span class="badge badge-teal">₹${d.consultation_fee || 0}</span>
              </div>`).join('') : `<p style="color:var(--slate-light)">No matching doctors.</p>`;
          };
          document.getElementById("doc-search").addEventListener("input", draw);
          document.getElementById("doc-spec-filter").addEventListener("change", draw);
          draw();
        } catch (e) { area.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`; }
        return;
      }

      if (state.step === "profile") {
        try {
          const myProfiles = await api("GET", "/portal/dashboard/profiles");
          const linkedHere = myProfiles.filter(p => p.hospital_id === state.hospitalId);
          const list = linkedHere.length ? linkedHere : myProfiles;
          if (!list.length) { area.innerHTML = `<p style="color:var(--slate-light)">No linked profiles found.</p>`; return; }

          const note = !linkedHere.length && myProfiles.length
            ? `<p style="font-size:13px;color:var(--slate-light);margin-bottom:12px">None of your linked profiles have visited this hospital before — booking will register a new visit under your account.</p>` : '';

          const listEl = searchableFullWidthList(
            area, list,
            (p) => `<div class="select-row-card" data-id="${p.id}" data-name="${sanitize(p.display_name)}">
                      <div><div class="src-name">${sanitize(p.display_name)}</div><div class="src-sub">${p.relation}</div></div>
                    </div>`,
            (p, q) => p.display_name.toLowerCase().includes(q),
            "Search profiles..."
          );
          area.insertAdjacentHTML('afterbegin', note);
          area.addEventListener('click', function handler(e) {
            const card = e.target.closest('.select-row-card');
            if (!card) return;
            state.profileLinkId = parseInt(card.dataset.id);
            state.profileName = card.dataset.name;
            area.removeEventListener('click', handler);
            setStep("datetime");
          });
        } catch (e) { area.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`; }
        return;
      }

      if (state.step === "datetime") {
        renderDateTimeStep(area);
        return;
      }

      if (state.step === "payment") {
        area.innerHTML = `
          <div class="pay-summary-row"><span>Doctor</span><strong>${sanitize(state.doctorName)}</strong></div>
          <div class="pay-summary-row"><span>Hospital</span><strong>${sanitize(state.hospitalName)}</strong></div>
          <div class="pay-summary-row"><span>Date &amp; Time</span><strong>${sanitize(state.dateLabel)}, ${sanitize(state.slotTime)}</strong></div>
          <div class="pay-summary-row" style="font-size:16px"><span>Amount</span><strong style="color:var(--teal)">₹${state.doctorFee || 0}</strong></div>

          <div class="pay-method-tabs">
            <div class="pay-method-tab active" id="pm-card" onclick="setPayMethod('card')">Card</div>
            <div class="pay-method-tab" id="pm-upi" onclick="setPayMethod('upi')">UPI</div>
          </div>

          <div id="pay-fields-card">
            <div class="form-group"><label class="form-label">Card Number</label><input class="form-control" placeholder="4242 4242 4242 4242" maxlength="19" /></div>
            <div style="display:flex;gap:12px">
              <div class="form-group" style="flex:1"><label class="form-label">Expiry</label><input class="form-control" placeholder="MM/YY" /></div>
              <div class="form-group" style="flex:1"><label class="form-label">CVV</label><input class="form-control" placeholder="123" maxlength="3" /></div>
            </div>
          </div>
          <div id="pay-fields-upi" style="display:none">
            <div class="form-group"><label class="form-label">UPI ID</label><input class="form-control" placeholder="yourname@upi" /></div>
          </div>

          <p style="font-size:12px;color:var(--slate-light);margin:10px 0 16px">This is a placeholder payment screen — no real transaction is processed.</p>

          <div style="display:flex;gap:10px">
            <button class="btn btn-outline" style="flex:1" onclick="cancelPaymentAndGoBack()">Cancel and Go Back</button>
            <button class="btn btn-teal" style="flex:1" onclick="markPaidAndFinish()">Mark Paid</button>
          </div>`;
        return;
      }
    }

    // ---------- Combined date + time step ----------
    function renderDateTimeStep(area) {
      const days = [];
      const today = new Date();
      for (let i = 0; i < 15; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        days.push(d);
      }
      const monthLabel = days[0].toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });

      area.innerHTML = `
        <div class="date-scroll-wrap">
          <div class="date-month-label">${monthLabel}</div>
          <div class="date-scroll" id="date-scroll">
            ${days.map(d => {
              const iso = d.toISOString().split('T')[0];
              const dayNum = d.getDate();
              const abbr = d.toLocaleDateString('en-IN', { weekday: 'short' });
              return `<div class="date-pill" data-date="${iso}" data-label="${abbr}, ${dayNum} ${d.toLocaleDateString('en-IN',{month:'short'})}">
                <div class="dnum">${dayNum}</div><div class="dabbr">${abbr}</div></div>`;
            }).join('')}
          </div>
        </div>
        <div id="slot-sections">${placeholderSlotSections()}</div>`;

      document.querySelectorAll('.date-pill').forEach(el => el.addEventListener('click', () => {
        document.querySelectorAll('.date-pill').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        state.date = el.dataset.date;
        state.dateLabel = el.dataset.label;
        loadRealSlots();
      }));

      attachPlaceholderClickWarning();
    }

    function placeholderSlotSections() {
      const periods = [["Morning", 3], ["Afternoon", 3], ["Evening", 3]];
      return periods.map(([label, count]) => `
        <div class="slot-period-title">${label}</div>
        <div class="slot-grid">
          ${Array.from({ length: count }).map(() => `<div class="slot-chip placeholder"><span class="dot"></span>--:--</div>`).join('')}
        </div>`).join('');
    }

    function attachPlaceholderClickWarning() {
      document.querySelectorAll('.slot-chip.placeholder').forEach(chip => {
        chip.addEventListener('click', () => toast("Select a date first", "error"));
      });
    }

    async function loadRealSlots() {
      const wrap = document.getElementById("slot-sections");
      wrap.innerHTML = `<p>Loading available slots...</p>`;
      try {
        const grouped = await api("GET", `/portal/hospitals/${state.hospitalId}/doctors/${state.doctorId}/slots?date=${state.date}`);
        const periods = [["morning", "Morning"], ["afternoon", "Afternoon"], ["evening", "Evening"]];
        const anySlots = periods.some(([k]) => grouped[k]?.length);
        wrap.innerHTML = !anySlots ? `<p style="color:var(--slate-light);margin-top:14px">No slots are available for this date. Try another date above, or check back later.</p>` :
          periods.map(([key, label]) => grouped[key]?.length ? `
            <div class="slot-period-title">${label}</div>
            <div class="slot-grid">
              ${grouped[key].map(s => `
                <div class="slot-chip ${s.level}" ${s.full ? '' : `onclick='pickSlot(${s.id}, ${JSON.stringify(s.time)})'`}>
                  <span class="dot"></span>${s.time}
                </div>`).join('')}
            </div>` : '').join('');
      } catch (e) {
        wrap.innerHTML = `<p class="err-msg" style="display:block">Could not load time slots right now (${e.message}). Please try again in a moment.</p>`;
      }
    }

    function setPayMethod(m) {
      document.getElementById("pm-card").classList.toggle("active", m === "card");
      document.getElementById("pm-upi").classList.toggle("active", m === "upi");
      document.getElementById("pay-fields-card").style.display = m === "card" ? "block" : "none";
      document.getElementById("pay-fields-upi").style.display = m === "upi" ? "block" : "none";
    }

    function pickHospital(id, name) { state.hospitalId = id; state.hospitalName = name; setStep("doctor"); }
    function pickDoctor(id, name, fee) { state.doctorId = id; state.doctorName = name; state.doctorFee = fee; setStep("profile"); }
    function pickSlot(id, time) { state.slotId = id; state.slotTime = time; openConfirmModal(); }

    function openConfirmModal() {
      document.getElementById("confirm-body").innerHTML = `
        <div class="pay-summary-row"><span>Patient</span><strong>${sanitize(state.profileName)}</strong></div>
        <div class="pay-summary-row"><span>Doctor</span><strong>${sanitize(state.doctorName)}</strong></div>
        <div class="pay-summary-row"><span>Hospital</span><strong>${sanitize(state.hospitalName)}</strong></div>
        <div class="pay-summary-row"><span>Date &amp; Time</span><strong>${sanitize(state.dateLabel)}, ${sanitize(state.slotTime)}</strong></div>`;
      document.getElementById("modal-confirm").classList.add("open");
    }
    function closeConfirmModal() { document.getElementById("modal-confirm").classList.remove("open"); }

    async function proceedToPayment() {
      const btn = document.getElementById("btn-pay-book");
      btn.disabled = true;
      try {
        const appt = await api("POST", "/portal/appointments", {
          hospital_id: state.hospitalId, doctor_id: state.doctorId,
          profile_link_id: state.profileLinkId, slot_id: state.slotId, type: "scheduled",
        });
        state.pendingAppointmentId = appt.id;
        closeConfirmModal();
        setStep("payment");
      } catch (e) { toast(e.message, "error"); }
      finally { btn.disabled = false; }
    }

    async function cancelPaymentAndGoBack() {
      if (state.pendingAppointmentId) {
        try { await api("POST", `/portal/appointments/${state.pendingAppointmentId}/cancel`); } catch (e) { }
        state.pendingAppointmentId = null;
      }
      goBack();
    }

    async function markPaidAndFinish() {
      try {
        await api("POST", `/portal/appointments/${state.pendingAppointmentId}/mark-paid`);
        toast("Payment successful — you're on the hospital's queue", "success");
        state.pendingAppointmentId = null;
        state.history = [];
        setStep("location", false);
      } catch (e) { toast(e.message, "error"); }
    }

    function openMyAppointmentsModal() { document.getElementById("modal-my-appointments").classList.add("open"); loadAppointments(); }
    function closeMyAppointmentsModal() { document.getElementById("modal-my-appointments").classList.remove("open"); }

    async function loadAppointments() {
      const list = document.getElementById("appt-list");
      list.innerHTML = `<p>Loading...</p>`;
      try {
        const appts = await api("GET", "/portal/appointments");
        if (!appts.length) { list.innerHTML = `<p style="color:var(--slate-light)">No appointments yet.</p>`; return; }
        const statusBadge = { booked: "badge-grey", confirmed: "badge-teal", completed: "badge-green", cancelled: "badge-red", no_show: "badge-red" };
        list.innerHTML = appts.map(a => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px">
            <div>
              <div style="font-weight:500">${sanitize(a.hospital_name || 'Hospital')}${a.doctor_name ? ' · ' + sanitize(a.doctor_name) : ''}</div>
              <div style="font-size:12px;color:var(--slate-light);margin-top:2px">${new Date(a.requested_time).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="badge ${statusBadge[a.status] || 'badge-grey'}">${a.status}</span>
              <span class="badge ${a.payment_status === 'paid' ? 'badge-green' : 'badge-red'}">${a.payment_status}</span>
              ${(a.status === 'booked' || a.status === 'confirmed') ? `<button class="btn btn-outline btn-sm" onclick="cancelAppt(${a.id})">Cancel</button>` : ''}
            </div>
          </div>`).join('');
      } catch (e) { list.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`; }
    }

    async function cancelAppt(id) {
      try { await api("POST", `/portal/appointments/${id}/cancel`); toast("Appointment cancelled", "success"); loadAppointments(); }
      catch (e) { toast(e.message, "error"); }
    }

    updateHeader();
    setStep("location", false);
  </script>
</body>

</html>
