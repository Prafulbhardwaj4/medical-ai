<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab — MedScribe</title>
  <link rel="stylesheet" href="../css/style.css?v=4" />
  <style>
    /* Tab sections (Home / Pending) - only the active one shows, on both
       mobile and desktop. Attendance is a 3rd tab on mobile only; on
       desktop it's a persistent block at the top, not tab-switched. */
    .mobile-section {
      display: none;
    }

    .mobile-section.active {
      display: block;
    }

    @media (min-width: 901px) {
      .mobile-section {
        display: none !important;
      }

      .mobile-section.active {
        display: block !important;
      }

      #section-attendance.mobile-section {
        display: block !important;
        margin-bottom: 20px;
      }
    }

    /* Attendance tab - custom desktop layout: title left, controls right, one row */
    @media (min-width: 901px) {
      #lab-attendance-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
      }
      #lab-attendance-card .card-header {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
        flex: 0 0 auto;
      }
      #lab-attendance-card .staff-att-actions {
        flex: 0 0 auto;
      }
    }

    .bulk-test-block {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: 14px;
    }
    .bulk-test-block h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--navy);
    }
    .bulk-param-row {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .bulk-param-meta { font-size: 13px; }
    .bulk-param-meta .range-text {
      display: block;
      font-size: 12px;
      color: var(--slate);
      margin-top: 2px;
    }
    @media (max-width: 640px) {
      #modal-bulk-results .modal {
        max-width: 100%;
        width: 100%;
        height: 100%;
        max-height: 100%;
        margin: 0;
        border-radius: 0;
      }
      .bulk-test-block {
        padding: 0;
        border: none;
        border-bottom: 8px solid var(--smoke-mid);
        border-radius: 0;
        margin-bottom: 0;
      }
      .bulk-test-block h3 {
        background: var(--teal-subtle);
        color: var(--navy);
        padding: 12px 14px;
        margin: 0;
        border-bottom: 1px solid var(--border);
      }
      .bulk-param-row {
        grid-template-columns: 1fr;
        padding: 12px 14px;
        margin: 0;
        border-bottom: 1px solid var(--border);
      }
      .bulk-param-row:last-child { border-bottom: none; }
      .bulk-param-row input {
        font-size: 16px;
        padding: 10px 12px;
      }
    }

    .btn-whatsapp {
      background: #065f46;
      border: 1px solid #065f46;
      color: var(--white);
    }
    .btn-whatsapp:hover { filter: brightness(0.95); }
    .badge-green { background: #065f46; color: var(--white); }

    /* Queue: one card per patient */
    .lq-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .lq-card:hover {
      border-color: var(--teal);
    }

    .lq-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .lq-card-head button {
      flex-shrink: 0;
    }

    .lq-top {
      flex: 1;
      min-width: 0;
    }

    .lq-name {
      font-size: 15px;
    }

    .lq-sub {
      font-size: 13px;
      color: var(--slate);
      margin-top: 2px;
    }

    @media (min-width: 901px) {
      .lq-card {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
      }
    }

    /* Patient tests modal — per-test rows */
    .lp-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }

    .lp-item:first-of-type {
      border-top: none;
    }

    .lp-item button {
      width: 100%;
    }

    @media (min-width: 901px) {
      .lp-item {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

      .lp-item button {
        width: auto;
      }
    }

    /* Pending tab: one card per patient, all their pending tests listed, one Requeue button */
    .lp-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
    }

    .lp-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .lp-test-list {
      list-style: none;
      padding: 0;
      margin: 0 0 8px;
    }

    .lp-test-list li {
      font-size: 13px;
      padding: 4px 0;
      border-top: 1px dashed var(--border);
    }

    .lp-test-list li:first-child {
      border-top: none;
    }

    .lp-card-meta {
      font-size: 12px;
      color: var(--slate);
      margin-bottom: 10px;
    }

    .lp-card button {
      width: 100%;
    }

    @media (min-width: 901px) {
      .lp-card {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .lp-card-top {
        margin-bottom: 4px;
      }

      .lp-card-body {
        flex: 1;
        min-width: 240px;
      }

      .lp-card button {
        width: auto;
        margin-top: 2px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <span id="topbar-clinic" style="color:var(--slate)"></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Sign out</button>
      </div>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
        <span class="profile-dot" id="profile-dot"></span>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span id="profile-menu-clinic"></span>
      </div>
      <button class="profile-menu-item" onclick="closeProfileMenu();toast('Settings — Coming Soon','info')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        Settings
      </button>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Sign out
      </button>
    </div>

    <nav class="sidebar">
      <div class="sidebar-section-label">Navigation</div>
      <div class="nav-item active" id="sidebar-tab-queue" onclick="showLabSection('queue')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 3h6m-6 0v5.586a1 1 0 01-.293.707L4.293 13.707A1 1 0 004 14.414V19a2 2 0 002 2h12a2 2 0 002-2v-4.586a1 1 0 00-.293-.707l-4.414-4.414A1 1 0 0115 8.586V3" />
        </svg>
        Home
      </div>
      <div class="nav-item" id="sidebar-tab-pending" onclick="showLabSection('pending')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
        </svg>
        Pending
      </div>
      <div class="nav-item" id="sidebar-tab-reports" onclick="showLabSection('reports')">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Reports
      </div>
    </nav>

    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <nav class="bottom-nav">
      <button class="bottom-nav-item active" id="tab-btn-queue" onclick="showLabSection('queue')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 3h6m-6 0v5.586a1 1 0 01-.293.707L4.293 13.707A1 1 0 004 14.414V19a2 2 0 002 2h12a2 2 0 002-2v-4.586a1 1 0 00-.293-.707l-4.414-4.414A1 1 0 0115 8.586V3" />
        </svg>
        Home
      </button>
      <button class="bottom-nav-item" id="tab-btn-pending" onclick="showLabSection('pending')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
        </svg>
        Pending
      </button>
      <button class="bottom-nav-item" id="tab-btn-attendance" onclick="showLabSection('attendance')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        Attendance
      </button>
      <button class="bottom-nav-item" id="tab-btn-reports" onclick="showLabSection('reports')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Reports
      </button>
    </nav>

    <main class="main-content">

      <!-- Attendance: mobile tab (3rd bottom-nav tab) / always-visible block on desktop -->
      <div class="mobile-section" id="section-attendance">
        <div class="card" id="lab-attendance-card">
          <div class="card-header">
            <h2>Today's Status</h2>
          </div>
          <div class="staff-att-status">
            <span class="badge badge-grey" id="lab-attendance-badge">Not marked</span>
          </div>
          <div class="staff-att-actions">
            <select class="form-control" id="lab-room-select" style="display:none"
              onchange="markLabAttendance(labCurrentStatus)"></select>
            <button class="btn btn-primary" id="lab-btn-present" onclick="markLabAttendance('present')">Mark
              Present</button>
            <button class="btn btn-outline" id="lab-btn-break" onclick="markLabAttendance('on_break')"
              style="display:none">On Break</button>
            <button class="btn btn-outline" id="lab-btn-offduty" onclick="markLabAttendance('off_duty')"
              style="display:none;color:var(--danger);border-color:var(--danger)">Off Duty</button>
          </div>
        </div>
      </div>

      <!-- Home tab -->
      <div class="mobile-section active" id="section-queue">
        <div class="card">
          <div class="card-header">
            <h2>Home</h2>
          </div>
          <div id="lab-queue-list">
            <p style="color:var(--slate)">Loading…</p>
          </div>
        </div>
      </div>

      <!-- Pending tab -->
      <div class="mobile-section" id="section-pending">
        <div class="card">
          <div class="card-header">
            <h2>Pending Tasks</h2>
          </div>
          <input class="form-control" id="lab-pending-search" placeholder="Search patient to requeue a paid test…"
            oninput="searchLabPendingTasks(this.value)" style="margin-bottom:12px" />
          <div id="lab-pending-results"></div>
        </div>
      </div>

      <!-- Reports tab -->
      <div class="mobile-section" id="section-reports">
        <div class="card">
          <div class="card-header">
            <h2>Reports</h2>
          </div>
          <input class="form-control" id="lab-reports-search" placeholder="Search by patient name or UID…"
            oninput="searchLabReports(this.value)" style="margin-bottom:12px" />
          <div id="lab-reports-list"><p style="color:var(--slate)">Loading…</p></div>
        </div>
      </div>

    </main>
  </div>

  <!-- Patient Tests Modal -->
  <div class="modal-overlay" id="modal-patient-tests">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h2 id="patient-tests-modal-title" style="margin:0"></h2>
          <p style="margin:2px 0 0;font-size:13px;color:var(--slate)" id="patient-tests-modal-sub"></p>
        </div>
        <button class="modal-close" onclick="closePatientTestsModal()">×</button>
      </div>
      <button class="btn btn-primary" id="patient-tests-top-action" style="display:none;width:100%;margin-bottom:14px"></button>
      <div id="patient-tests-list"></div>
    </div>
  </div>

  <!-- Patient Reports Modal (Reports tab) -->
  <div class="modal-overlay" id="modal-patient-reports">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h2 id="patient-reports-modal-title" style="margin:0"></h2>
          <p style="margin:2px 0 0;font-size:13px;color:var(--slate)" id="patient-reports-modal-sub"></p>
        </div>
        <button class="modal-close" onclick="closePatientReportsModal()">×</button>
      </div>
      <div id="patient-reports-list"></div>
    </div>
  </div>

  <!-- Bulk Results Entry Modal -->
  <div class="modal-overlay" id="modal-bulk-results">
    <div class="modal" style="max-width:720px;max-height:88vh;display:flex;flex-direction:column">
      <div class="modal-header">
        <h2 style="margin:0">Enter Results</h2>
        <button class="modal-close" onclick="closeBulkResultsModal()">×</button>
      </div>
      <div id="bulk-results-body" style="overflow-y:auto;flex:1;padding-right:4px"></div>
      <div class="err-msg" id="bulk-results-err" style="margin:12px 0"></div>
      <div style="display:flex;gap:12px;padding-top:12px;border-top:1px solid var(--border)">
        <button class="btn btn-primary" style="flex:1" id="btn-save-bulk-results" onclick="submitBulkResults()">Save All Results & Generate Report</button>
        <button class="btn btn-outline" style="flex:1" onclick="closeBulkResultsModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../js/api.js?v=4"></script>
  <script>
    if (!requireAuth()) throw new Error("Not authenticated");
    if (getDoctor()?.role !== 'lab') window.location.href = 'login.html';
    fillTopbar();

    let labCurrentStatus = 'not_marked';

    function showLabSection(id) {
      ['queue', 'pending', 'attendance', 'reports'].forEach(s => {
        document.getElementById('section-' + s).classList.toggle('active', s === id);
        const bottomBtn = document.getElementById('tab-btn-' + s);
        if (bottomBtn) bottomBtn.classList.toggle('active', s === id);
        const sideBtn = document.getElementById('sidebar-tab-' + s);
        if (sideBtn) sideBtn.classList.toggle('active', s === id);
      });
      if (id === 'pending') runLabPendingSearch(document.getElementById('lab-pending-search').value);
      if (id === 'reports') runLabReportsSearch(document.getElementById('lab-reports-search').value);
    }

    let labReportsSearchTimer;
    function searchLabReports(val) {
      clearTimeout(labReportsSearchTimer);
      labReportsSearchTimer = setTimeout(() => runLabReportsSearch(val), 350);
    }

    async function runLabReportsSearch(q) {
      try {
        const results = await api("GET", `/lab/reports/history?q=${encodeURIComponent(q)}`);
        renderLabReports(results);
      } catch (e) { }
    }

    function renderLabReports(results) {
      const el = document.getElementById('lab-reports-list');
      if (!results.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:8px 0">No completed reports yet.</p>';
        return;
      }
      labReportsData = results;
      el.innerHTML = results.map((r, idx) => `
        <div class="lp-card">
          <div class="lp-card-body">
            <div class="lp-card-top">
              <strong>${sanitize(r.patient_name)}</strong>
              <span style="font-size:12px;color:var(--slate)">${r.token_number ? 'Token #' + sanitize(r.token_number) : ''}</span>
            </div>
            <div style="font-size:13px;color:var(--slate);margin-top:4px">${sanitize(r.test_names.join(', '))}</div>
            <div style="font-size:12px;color:var(--slate-light);margin-top:2px">${r.completed_at ? formatDateTime(r.completed_at) : ''}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-outline btn-sm" onclick="downloadReport([${r.tests.map(t => t.order_id).join(',')}])">Download</button>
            <button class="btn btn-sm btn-whatsapp" onclick="event.stopPropagation();toast('Send on WhatsApp — Coming Soon','info')">Send on WhatsApp</button>
          </div>
        </div>
      `).join('');
    }

    let labReportsData = [];

    function openPatientReportsModal(idx) {
      const r = labReportsData[idx];
      if (!r) return;
      document.getElementById('patient-reports-modal-title').textContent = r.patient_name;
      document.getElementById('patient-reports-modal-sub').textContent =
        `Token #${r.token_number}${r.patient_uid ? ' · UID ' + r.patient_uid : ''}`;
      document.getElementById('patient-reports-list').innerHTML = r.tests.map(t => `
        <div class="lp-item">
          <div style="font-size:13px">
            <strong>${sanitize(t.test_name)}</strong>
            <div style="color:var(--slate);font-size:12px;margin-top:2px">${t.completed_at ? formatDateTime(t.completed_at) : ''}</div>
          </div>
          <button class="btn btn-outline btn-sm" onclick="downloadReport(${t.order_id})">Download</button>
        </div>
      `).join('');
      document.getElementById('modal-patient-reports').classList.add('open');
    }

    function closePatientReportsModal() {
      document.getElementById('modal-patient-reports').classList.remove('open');
    }

    let labPendingSearchTimer;
    function searchLabPendingTasks(val) {
      clearTimeout(labPendingSearchTimer);
      labPendingSearchTimer = setTimeout(() => runLabPendingSearch(val), 350);
    }
    document.addEventListener('DOMContentLoaded', () => runLabPendingSearch(''));

    async function runLabPendingSearch(q) {
      try {
        const results = await api("GET", `/lab/pending-tasks?q=${encodeURIComponent(q)}`);
        renderLabPendingResults(results, q.trim().length > 0);
      } catch (e) { }
    }

    function renderLabPendingResults(results, hasQuery) {
      const el = document.getElementById('lab-pending-results');
      if (!results.length) {
        el.innerHTML = `<p style="color:var(--slate-light);padding:8px 0">${hasQuery ? 'No matches for this search.' : 'No pending tasks right now.'}</p>`;
        return;
      }
      el.innerHTML = results.map(r => {
        const orderIds = r.pending.map(p => p.order_id).join(',');
        const totalPrice = r.pending.reduce((sum, p) => sum + (p.price || 0), 0);
        return `
        <div class="lp-card">
          <div class="lp-card-body">
            <div class="lp-card-top">
              <strong>${sanitize(r.patient_name)}</strong>
              <span class="badge badge-navy">${sanitize(r.patient_uid)}</span>
            </div>
            <ul class="lp-test-list">
              ${r.pending.map(p => `<li>${sanitize(p.test_name)} — Rs.${p.price} <span style="color:var(--slate-light)">(Dr. ${sanitize(p.doctor_name)})</span></li>`).join('')}
            </ul>
            <div class="lp-card-meta">${r.pending.length} test${r.pending.length > 1 ? 's' : ''} · Rs.${totalPrice} total</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="requeueAllForPatient('${orderIds}')">Requeue</button>
        </div>
      `;
      }).join('');
    }

    function formatDateTime(iso) {
      if (!iso) return '';
      const ist = /[+-]\d\d:\d\d$|Z$/.test(iso) ? iso : iso + "+05:30";
      return new Date(ist).toLocaleString("en-IN", {
        timeZone: "Asia/Kolkata",
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit", hour12: true
      });
    }

    async function requeueAllForPatient(orderIdsCsv) {
      const orderIds = orderIdsCsv.split(',').map(Number);
      try {
        for (const id of orderIds) {
          await api("POST", `/lab/orders/${id}/requeue`, {});
        }
        toast('Requeued.', 'success');
        runLabPendingSearch(document.getElementById('lab-pending-search').value);
        loadQueue();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function loadLabAttendance() {
      try {
        const data = await api("GET", "/doctors/attendance/my-status");
        await loadLabRoomOptions(data.room_id);
        renderLabBadge(data.status);
      } catch (e) { }
    }

    async function loadLabRoomOptions(selectedId) {
      try {
        const rooms = await api("GET", "/admin/rooms?for_picker=lab");
        document.getElementById('lab-room-select').innerHTML =
          '<option value="">No room</option>' +
          rooms.map(r => `<option value="${r.id}" ${r.id === selectedId ? 'selected' : ''}>${r.display || r.name || r.room_number}</option>`).join('');
      } catch (e) { }
    }

    function renderLabBadge(status) {
      labCurrentStatus = status;
      const badge = document.getElementById('lab-attendance-badge');
      const btnPresent = document.getElementById('lab-btn-present');
      const btnBreak = document.getElementById('lab-btn-break');
      const btnOffDuty = document.getElementById('lab-btn-offduty');
      document.getElementById('lab-room-select').style.display = (status === 'present' || status === 'on_break') ? '' : 'none';
      if (status === 'present') {
        badge.className = 'badge badge-green'; badge.textContent = 'Present';
        btnPresent.style.display = 'none'; btnBreak.style.display = ''; btnOffDuty.style.display = '';
      } else if (status === 'on_break') {
        badge.className = 'badge badge-amber'; badge.textContent = 'On Break';
        btnPresent.textContent = 'Resume'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = '';
      } else if (status === 'off_duty') {
        badge.className = 'badge badge-red'; badge.textContent = 'Off Duty';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      } else {
        badge.className = 'badge badge-grey'; badge.textContent = 'Not marked';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      }
    }

    function isLabPresent() {
      const badge = document.getElementById('lab-attendance-badge');
      return badge && (badge.textContent === 'Present' || badge.textContent === 'On Break');
    }

    async function markLabAttendance(status) {
      try {
        const wasAlreadyPresent = labCurrentStatus === status;
        const roomVal = document.getElementById('lab-room-select').value;
        const room_id = roomVal ? parseInt(roomVal) : null;
        await api("POST", "/doctors/attendance", { status, room_id });
        renderLabBadge(status);
        if (!wasAlreadyPresent) {
          const labels = { present: "Marked present.", on_break: "On break.", off_duty: "Marked off duty." };
          toast(labels[status] || "Status updated.", "success");
        }
      } catch (e) { toast(e.message, "error"); }
    }

    let labQueueData = [];

    async function loadQueue() {
      try {
        const items = await api("GET", "/lab/queue");
        labQueueData = items;
        renderQueue(items);
        refreshOpenPatientModal();
      } catch (e) { toast(e.message, "error"); }
    }

    const STATUS_LABEL = {
      paid: "Awaiting Sample",
      sample_collected: "Sample Collected",
      processing: "Processing",
      completed: "Completed"
    };
    const STATUS_BADGE = {
      paid: "badge-amber",
      sample_collected: "badge-navy",
      processing: "badge-teal",
      completed: "badge-green"
    };

    function groupQueueByPatient(items) {
      const map = new Map();
      items.forEach(o => {
        const key = o.patient_id != null ? `p${o.patient_id}` : `${o.patient_name}__${o.token_number}`;
        if (!map.has(key)) {
          map.set(key, {
            key,
            patient_id: o.patient_id,
            patient_name: o.patient_name,
            patient_uid: o.patient_uid,
            token_number: o.token_number,
            tests: []
          });
        }
        map.get(key).tests.push(o);
      });
      return Array.from(map.values());
    }

    function renderQueue(items) {
      const el = document.getElementById('lab-queue-list');
      if (!items.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:12px 0">No tests waiting in queue.</p>';
        return;
      }
      const groups = groupQueueByPatient(items);
      el.innerHTML = groups.map(g => {
        const pendingCount = g.tests.filter(t => t.status !== 'completed').length;
        const summaryBadge = pendingCount === 0
          ? '<span class="badge badge-green">All completed</span>'
          : `<span class="badge badge-amber">${pendingCount} pending</span>`;
        return `
        <div class="lq-card" onclick="openPatientTestsModal('${g.key}')">
          <div class="lq-card-head">
            <div class="lq-top">
              <strong class="lq-name">${sanitize(g.patient_name)}</strong>
              <div class="lq-sub">Token #${sanitize(g.token_number)} · ${g.tests.length} test${g.tests.length > 1 ? 's' : ''}</div>
            </div>
          </div>
          ${summaryBadge}
        </div>
      `;
      }).join('');
    }

    let currentPatientKey = null;
    let testDetailCache = {};

    async function openPatientTestsModal(key) {
      const group = groupQueueByPatient(labQueueData).find(g => g.key === key);
      if (!group) return;
      currentPatientKey = key;
      document.getElementById('patient-tests-modal-title').textContent = group.patient_name;
      document.getElementById('patient-tests-modal-sub').textContent =
        `Token #${group.token_number}${group.patient_uid ? ' · UID ' + group.patient_uid : ''}`;
      document.getElementById('patient-tests-list').innerHTML = '<p style="color:var(--slate)">Loading…</p>';
      document.getElementById('modal-patient-tests').classList.add('open');

      const uniqueIds = [...new Set(group.tests.map(t => t.test_id).filter(id => id != null && !testDetailCache[id]))];
      await Promise.all(uniqueIds.map(async id => {
        try { testDetailCache[id] = await api("GET", `/lab/tests/${id}`); } catch (e) { }
      }));

      renderPatientTestsList(group);
    }

    function closePatientTestsModal() {
      document.getElementById('modal-patient-tests').classList.remove('open');
      currentPatientKey = null;
    }

    function refreshOpenPatientModal() {
      if (currentPatientKey == null) return;
      const group = groupQueueByPatient(labQueueData).find(g => g.key === currentPatientKey);
      if (group) renderPatientTestsList(group);
      else closePatientTestsModal();
    }

    function renderPatientTestsList(group) {
      const el = document.getElementById('patient-tests-list');
      el.innerHTML = group.tests.map(o => {
        const detail = o.test_id != null ? testDetailCache[o.test_id] : null;
        const subtestsLine = (detail && detail.is_panel && detail.parameters.length)
          ? `<div style="font-size:12px;color:var(--slate);margin-top:2px">${detail.parameters.map(p => sanitize(p.name)).join(', ')}</div>`
          : '';
        let actionHtml;
        if (o.status === 'paid' && o._deferred) {
          actionHtml = `<span style="font-size:12px;color:var(--slate-light);font-style:italic">Marked for later</span>`;
        } else if (o.status === 'paid') {
          actionHtml = `<button class="btn btn-outline btn-sm" onclick="deferTest(${o.id})">Mark for Later</button>`;
        } else {
          actionHtml = '';
        }
        return `
        <div class="lp-item">
          <div style="font-size:13px">
            <strong>${sanitize(o.test_name)}</strong>
            ${subtestsLine}
            <div style="margin-top:4px"><span class="badge ${STATUS_BADGE[o.status] || 'badge-grey'}" id="lp-status-${o.id}">${STATUS_LABEL[o.status] || o.status}</span></div>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
            ${actionHtml}
          </div>
        </div>
      `;
      }).join('');
      updatePatientTestsTopAction(group);
    }

    async function deferTest(orderId) {
      try {
        await api("POST", `/lab/orders/${orderId}/defer`, {});
        const order = labQueueData.find(o => o.id === orderId);
        if (order) order._deferred = true;
        renderQueue(labQueueData);
        refreshOpenPatientModal();
        toast('Marked for later — moved to Pending Tasks.', 'success');
      } catch (e) { toast(e.message, 'error'); }
    }

    function updatePatientTestsTopAction(group) {
      const btn = document.getElementById('patient-tests-top-action');
      const hasPaid = group.tests.some(t => t.status === 'paid' && !t._deferred);
      const hasProcessing = group.tests.some(t => t.status === 'processing');
      const completedTests = group.tests.filter(t => t.status === 'completed');
      if (hasPaid) {
        btn.style.display = '';
        btn.textContent = 'Samples Collected';
        btn.onclick = () => { if (!isLabPresent()) { toast('Mark yourself Present first.', 'info'); return; } bulkAdvanceFromModal(); };
      } else if (hasProcessing) {
        btn.style.display = '';
        btn.textContent = 'Enter Test Results';
        btn.onclick = () => { if (!isLabPresent()) { toast('Mark yourself Present first.', 'info'); return; } openBulkResultsModal(); };
      } else if (completedTests.length) {
        btn.style.display = '';
        btn.textContent = 'Download Report';
        btn.onclick = () => downloadReport(completedTests.map(t => t.id));
      } else {
        btn.style.display = 'none';
      }
    }

    async function bulkAdvanceFromModal() {
      const group = groupQueueByPatient(labQueueData).find(g => g.key === currentPatientKey);
      if (!group) return;
      const toAdvance = group.tests.filter(t => t.status === 'paid' && !t._deferred);
      if (!toAdvance.length) return;
      try {
        for (const t of toAdvance) {
          await api("PATCH", `/lab/orders/${t.id}/status`, { status: 'sample_collected' });
          await api("PATCH", `/lab/orders/${t.id}/status`, { status: 'processing' });
          const order = labQueueData.find(o => o.id === t.id);
          if (order) order.status = 'processing';
        }
        renderQueue(labQueueData);
        refreshOpenPatientModal();
        toast(`Marked ${toAdvance.length} test${toAdvance.length > 1 ? 's' : ''} sample collected — ready for results.`, 'success');
      } catch (e) { toast(e.message, 'error'); }
    }

    let bulkResultOrders = [];

    async function openBulkResultsModal() {
      const group = groupQueueByPatient(labQueueData).find(g => g.key === currentPatientKey);
      if (!group) return;
      const processingTests = group.tests.filter(t => t.status === 'processing');
      if (!processingTests.length) { toast('No tests ready for result entry.', 'info'); return; }

      const bodyEl = document.getElementById('bulk-results-body');
      bodyEl.innerHTML = '<p style="color:var(--slate)">Loading…</p>';
      document.getElementById('bulk-results-err').textContent = '';
      document.getElementById('modal-bulk-results').classList.add('open');

      const isMale = (group.tests[0].patient_gender || '').toLowerCase() === 'male';
      bulkResultOrders = [];

      for (const t of processingTests) {
        let detail = null;
        if (t.test_id) {
          try { detail = await api("GET", `/lab/tests/${t.test_id}`); } catch (e) { }
        }
        if (detail && detail.is_panel && detail.parameters.length) {
          bulkResultOrders.push({
            orderId: t.id,
            testName: t.test_name,
            mode: 'panel',
            params: detail.parameters.map(p => ({
              id: p.id, name: p.name, unit: p.unit,
              range: isMale ? p.reference_range_male : p.reference_range_female
            }))
          });
        } else {
          bulkResultOrders.push({
            orderId: t.id,
            testName: t.test_name,
            mode: 'single',
            unit: detail ? detail.unit : '',
            range: detail ? (isMale ? detail.reference_range_male : detail.reference_range_female) : ''
          });
        }
      }

      bodyEl.innerHTML = bulkResultOrders.map(test => `
        <div class="bulk-test-block">
          <h3>${sanitize(test.testName)}</h3>
          ${test.mode === 'panel'
            ? test.params.map(p => `
              <div class="bulk-param-row">
                <div class="bulk-param-meta">
                  <strong>${sanitize(p.name)}</strong>${p.unit ? ' (' + sanitize(p.unit) + ')' : ''}
                  <span class="range-text">${p.range ? 'Reference: ' + sanitize(p.range) : 'No reference range set'}</span>
                </div>
                <input class="form-control" id="bulk-val-${test.orderId}-${p.id}" placeholder="Value" />
              </div>
            `).join('')
            : `
              <div class="bulk-param-row">
                <div class="bulk-param-meta">
                  <strong>Result</strong>${test.unit ? ' (' + sanitize(test.unit) + ')' : ''}
                  <span class="range-text">${test.range ? 'Reference: ' + sanitize(test.range) : 'No reference range set'}</span>
                </div>
                <input class="form-control" id="bulk-val-${test.orderId}-single" placeholder="Value" />
              </div>
            `
          }
        </div>
      `).join('');
    }

    function closeBulkResultsModal() {
      document.getElementById('modal-bulk-results').classList.remove('open');
      bulkResultOrders = [];
    }

    async function submitBulkResults() {
      const errEl = document.getElementById('bulk-results-err');
      errEl.textContent = '';
      const btn = document.getElementById('btn-save-bulk-results');
      const reportWindow = window.open('', '_blank');

      let anyFilled = false;
      const payloads = bulkResultOrders.map(test => {
        let results;
        if (test.mode === 'panel') {
          results = {};
          test.params.forEach(p => {
            const val = document.getElementById(`bulk-val-${test.orderId}-${p.id}`).value.trim();
            if (val) anyFilled = true;
            results[p.name] = val;
          });
        } else {
          const val = document.getElementById(`bulk-val-${test.orderId}-single`).value.trim();
          if (val) anyFilled = true;
          results = { value: val };
        }
        return { orderId: test.orderId, results };
      });

      if (!anyFilled) { errEl.textContent = 'Enter at least one result value.'; return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        for (const p of payloads) {
          await api("POST", `/lab/orders/${p.orderId}/result`, { results: p.results });
          await api("PATCH", `/lab/orders/${p.orderId}/status`, { status: 'completed' });
          const order = labQueueData.find(o => o.id === p.orderId);
          if (order) order.status = 'completed';
        }
        renderQueue(labQueueData);
        toast('Results saved — generating report…', 'success');
        closeBulkResultsModal();
        refreshOpenPatientModal();
        await downloadCombinedReport(payloads.map(p => p.orderId), reportWindow);
      } catch (e) {
        if (reportWindow) reportWindow.close();
        errEl.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save All Results & Generate Report';
      }
    }

    async function downloadCombinedReport(orderIds, preOpenedWindow) {
      const w = preOpenedWindow || window.open('', '_blank');
      try {
        const response = await fetch(`${BASE}/lab/reports/combined?order_ids=${orderIds.join(',')}`, {
          headers: { "Authorization": `Bearer ${getToken()}` }
        });
        if (!response.ok) throw new Error('Could not generate report');
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        if (w) w.location = url; else window.open(url, "_blank");
      } catch (e) {
        if (w) w.close();
        toast(e.message, 'error');
      }
    }

    async function downloadReport(orderIds) {
      const ids = Array.isArray(orderIds) ? orderIds : [orderIds];
      const w = window.open('', '_blank');
      await downloadCombinedReport(ids, w);
    }

    loadLabAttendance();
    loadQueue();
    setInterval(loadQueue, 15000);
  </script>
</body>

</html>
