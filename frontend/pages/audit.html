<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedScribe — Audit Log</title>
  <link rel="stylesheet" href="../css/style.css?v=3" />
  <style>
    .audit-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .audit-table th {
      text-align: left;
      padding: 8px 10px;
      color: var(--slate);
      font-weight: 600;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .audit-table td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .audit-table tr:last-child td {
      border-bottom: none;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .action-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-green { background: #dcfce7; color: #16a34a; }
    .badge-red { background: #fee2e2; color: #dc2626; }
    .badge-blue { background: #dbeafe; color: #2563eb; }
    .badge-orange { background: #ffedd5; color: #ea580c; }
    .badge-purple { background: #f3e8ff; color: #9333ea; }
    .badge-grey { background: #f1f5f9; color: #64748b; }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 20px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }

    .summary-card .count {
      font-size: 2rem;
      font-weight: 700;
      color: var(--navy);
    }

    .summary-card .label {
      font-size: 13px;
      color: var(--slate);
      margin-top: 4px;
    }

    .pagination {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    @media (max-width: 900px) {
      .filter-grid { grid-template-columns: 1fr 1fr; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 600px) {
      .filter-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <span id="topbar-clinic" style="color:var(--slate)"></span>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
    </header>

    <nav class="sidebar">
      <div class="sidebar-section-label">Audit & Compliance</div>
      <a class="nav-item active" href="audit.html">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        Audit Log
      </a>
      <div class="sidebar-section-label" style="margin-top:16px">Navigation</div>
      <a class="nav-item" href="analytics.html">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Analytics
      </a>
      <a class="nav-item" href="doctors.html">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Manage Doctors
      </a>
      <a class="nav-item" id="nav-superadmin" href="superadmin.html" style="display:none">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
        Super Admin
      </a>
    </nav>

    <main class="main-content">
      <div class="content-inner">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
          <div>
            <h1 style="font-size:1.75rem;font-weight:700;color:var(--navy)">Audit Log</h1>
            <div style="color:var(--slate);font-size:14px;margin-top:4px" id="audit-scope-label">Loading...</div>
          </div>
          <button class="btn btn-outline" onclick="exportCSV()">Export CSV</button>
        </div>

        <!-- Summary Cards -->
        <div class="summary-grid" id="summary-grid">
          <div class="summary-card">
            <div class="count" id="s-total">—</div>
            <div class="label">Total Events</div>
          </div>
          <div class="summary-card">
            <div class="count" id="s-accounts">—</div>
            <div class="label">Account Changes</div>
          </div>
          <div class="summary-card">
            <div class="count" id="s-prescriptions">—</div>
            <div class="label">Prescriptions Confirmed</div>
          </div>
          <div class="summary-card">
            <div class="count" id="s-voids">—</div>
            <div class="label">Consultations Voided</div>
          </div>
        </div>

        <!-- Filters -->
        <div class="card" style="margin-bottom:20px">
          <div class="filter-grid">
            <div class="form-group" style="margin:0">
              <label class="form-label">Event Type</label>
              <select class="form-control" id="f-action" onchange="applyFilters()">
                <option value="">All Events</option>
                <option value="account_created">Account Created</option>
                <option value="account_activated">Account Activated</option>
                <option value="account_deactivated">Account Deactivated</option>
                <option value="role_changed">Role Changed</option>
                <option value="hospital_created">Hospital Created</option>
                <option value="hospital_activated">Hospital Activated</option>
                <option value="hospital_deactivated">Hospital Deactivated</option>
                <option value="prescription_confirmed">Prescription Confirmed</option>
                <option value="consultation_voided">Consultation Voided</option>
                <option value="prescription_dispensed">Prescription Dispensed</option>
                <option value="patient_created">Patient Created</option>
                <option value="patient_updated">Patient Updated</option>
              </select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Category</label>
              <select class="form-control" id="f-target" onchange="applyFilters()">
                <option value="">All Categories</option>
                <option value="doctor">Doctors</option>
                <option value="hospital">Hospitals</option>
                <option value="consultation">Consultations</option>
                <option value="patient">Patients</option>
              </select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">From Date</label>
              <input class="form-control" type="date" id="f-from" onchange="applyFilters()" />
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">To Date</label>
              <input class="form-control" type="date" id="f-to" onchange="applyFilters()" />
            </div>
            <div>
              <button class="btn btn-outline" onclick="clearFilters()">Clear</button>
            </div>
          </div>
        </div>

        <!-- Log Table -->
        <div class="card">
          <div class="table-wrap">
            <table class="audit-table">
              <thead>
                <tr>
                  <th>When</th>
                  <th>Actor</th>
                  <th>Role</th>
                  <th>Event</th>
                  <th>Target</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody id="audit-tbody">
                <tr><td colspan="6" style="text-align:center;color:var(--slate);padding:32px">Loading...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>

      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const doc = getDoctor();
    if (!doc || !["admin", "sub_admin", "super_admin"].includes(doc.role)) {
      window.location.href = "dashboard.html";
    }

    // Show super admin nav item if applicable
    if (doc.role === "super_admin") {
      document.getElementById("nav-superadmin").style.display = "flex";
    }

    // Scope label
    const scopeLabel = doc.role === "super_admin"
      ? "Showing all events across all hospitals"
      : `Showing events for your hospital`;
    document.getElementById("audit-scope-label").textContent = scopeLabel;

    // Action label map
    const ACTION_LABELS = {
      account_created: "Account Created",
      account_activated: "Account Activated",
      account_deactivated: "Account Deactivated",
      role_changed: "Role Changed",
      hospital_created: "Hospital Created",
      hospital_activated: "Hospital Activated",
      hospital_deactivated: "Hospital Deactivated",
      prescription_confirmed: "Prescription Confirmed",
      consultation_voided: "Consultation Voided",
      prescription_dispensed: "Prescription Dispensed",
      patient_created: "Patient Created",
      patient_updated: "Patient Updated"
    };

    const ACTION_BADGE = {
      account_created: "badge-green",
      account_activated: "badge-green",
      account_deactivated: "badge-red",
      role_changed: "badge-purple",
      hospital_created: "badge-blue",
      hospital_activated: "badge-green",
      hospital_deactivated: "badge-red",
      prescription_confirmed: "badge-blue",
      consultation_voided: "badge-red",
      prescription_dispensed: "badge-orange",
      patient_created: "badge-green",
      patient_updated: "badge-orange"
    };

    const ROLE_LABELS = {
      super_admin: "Super Admin",
      admin: "Admin",
      sub_admin: "Sub Admin",
      doctor: "Doctor",
      system: "System"
    };

    let currentPage = 1;
    let allLogs = [];

    async function loadSummary() {
      try {
        const data = await api("GET", "/audit/summary");
        document.getElementById("s-total").textContent = data.total_events;
        document.getElementById("s-accounts").textContent =
          (data.action_breakdown["account_created"] || 0) +
          (data.action_breakdown["account_activated"] || 0) +
          (data.action_breakdown["account_deactivated"] || 0) +
          (data.action_breakdown["role_changed"] || 0);
        document.getElementById("s-prescriptions").textContent =
          data.action_breakdown["prescription_confirmed"] || 0;
        document.getElementById("s-voids").textContent =
          data.action_breakdown["consultation_voided"] || 0;
      } catch (e) { }
    }

    async function loadLogs(page = 1) {
      currentPage = page;
      const action = document.getElementById("f-action").value;
      const target = document.getElementById("f-target").value;
      const from = document.getElementById("f-from").value;
      const to = document.getElementById("f-to").value;

      const params = new URLSearchParams({ page, limit: 50 });
      if (action) params.append("action", action);
      if (target) params.append("target_type", target);
      if (from) params.append("from_date", from);
      if (to) params.append("to_date", to);

      const tbody = document.getElementById("audit-tbody");
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--slate);padding:32px">Loading...</td></tr>`;

      try {
        const data = await api("GET", `/audit/logs?${params.toString()}`);
        allLogs = data.logs || [];

        if (!allLogs.length) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--slate);padding:32px">No events found for the selected filters.</td></tr>`;
          document.getElementById("pagination").innerHTML = "";
          return;
        }

        tbody.innerHTML = allLogs.map(l => `
          <tr>
            <td style="white-space:nowrap;color:var(--slate);font-size:13px">${formatDateTime(l.created_at)}</td>
            <td style="font-weight:500">${sanitize(l.actor_name)}</td>
            <td style="font-size:13px;color:var(--slate)">${ROLE_LABELS[l.actor_role] || l.actor_role}</td>
            <td><span class="action-badge ${ACTION_BADGE[l.action] || 'badge-grey'}">${ACTION_LABELS[l.action] || l.action}</span></td>
            <td style="font-size:13px">
              <span style="color:var(--slate)">${l.target_type}</span>
              ${l.target_label ? `<br><span style="font-weight:500">${sanitize(l.target_label)}</span>` : ""}
            </td>
            <td style="font-size:13px;color:var(--slate)">${l.details ? sanitize(l.details) : "—"}</td>
          </tr>
        `).join("");

        renderPagination(data.total, data.page, data.pages);
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--danger);padding:32px">Failed to load logs. ${e.message}</td></tr>`;
      }
    }

    function renderPagination(total, page, pages) {
      const el = document.getElementById("pagination");
      if (pages <= 1) { el.innerHTML = ""; return; }
      let html = "";
      if (page > 1) html += `<button class="btn btn-outline btn-sm" onclick="loadLogs(${page - 1})">← Prev</button>`;
      for (let i = Math.max(1, page - 2); i <= Math.min(pages, page + 2); i++) {
        html += `<button class="btn btn-sm ${i === page ? 'btn-primary' : 'btn-outline'}" onclick="loadLogs(${i})">${i}</button>`;
      }
      if (page < pages) html += `<button class="btn btn-outline btn-sm" onclick="loadLogs(${page + 1})">Next →</button>`;
      el.innerHTML = html;
    }

    function applyFilters() {
      loadLogs(1);
    }

    function clearFilters() {
      document.getElementById("f-action").value = "";
      document.getElementById("f-target").value = "";
      document.getElementById("f-from").value = "";
      document.getElementById("f-to").value = "";
      loadLogs(1);
    }

    function formatDateTime(iso) {
      const d = new Date(iso);
      return d.toLocaleString("en-IN", {
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit", hour12: true
      });
    }

    function exportCSV() {
      if (!allLogs.length) { toast("No logs to export.", "error"); return; }
      const headers = ["When", "Actor", "Role", "Event", "Target Type", "Target", "Details"];
      const rows = allLogs.map(l => [
        formatDateTime(l.created_at),
        l.actor_name,
        ROLE_LABELS[l.actor_role] || l.actor_role,
        ACTION_LABELS[l.action] || l.action,
        l.target_type,
        l.target_label || "",
        l.details || ""
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(","));
      const csv = [headers.join(","), ...rows].join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `medscribe-audit-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Init
    fillTopbar();
    loadSummary();
    loadLogs(1);
  </script>
</body>

</html>
