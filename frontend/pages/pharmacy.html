<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pharmacy — MedScribe</title>
  <link rel="stylesheet" href="../css/style.css?v=3" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <span id="topbar-clinic" style="color:var(--slate)"></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Sign out</button>
      </div>
    </header>

    <nav class="sidebar">
      <div class="sidebar-section-label">Navigation</div>
      <div class="nav-item active">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
        </svg>
        Pharmacy Queue
      </div>
    </nav>

    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <main class="main-content">
      <div class="card" style="margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <strong>Today's Status:</strong>
          <span class="badge badge-grey" id="pharm-attendance-badge" style="margin-left:8px">Not marked</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <button class="btn btn-primary btn-sm" id="pharm-btn-present" onclick="markPharmAttendance('present')">Mark Present</button>
          <button class="btn btn-outline btn-sm" id="pharm-btn-break" onclick="markPharmAttendance('on_break')" style="display:none">On Break</button>
          <button class="btn btn-outline btn-sm" id="pharm-btn-offduty" onclick="markPharmAttendance('off_duty')" style="display:none;color:var(--danger);border-color:var(--danger)">Off Duty</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
          <h2 style="margin:0">Pharmacy Queue</h2>
          <button class="btn btn-outline btn-sm" onclick="loadQueue()">Refresh</button>
        </div>

        <div style="display:grid;grid-template-columns:1fr 200px;gap:10px;margin:16px 0 14px">
          <input class="form-control" id="pharm-search" placeholder="Search by token or patient name…" oninput="renderQueue()" />
          <select class="form-control" id="pharm-filter" onchange="renderQueue()">
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="dispensed">Dispensed</option>
          </select>
        </div>

        <div id="pharmacy-queue-list"><p style="color:var(--slate)">Loading…</p></div>
      </div>
    </main>
  </div>

  <!-- Prescription Detail Modal -->
  <div class="modal-overlay" id="modal-prescription">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h2>Prescription — <span id="rx-token"></span></h2>
        <button class="modal-close" onclick="closePrescriptionModal()">×</button>
      </div>
      <p style="font-size:14px;color:var(--slate);margin-bottom:4px"><strong>Patient:</strong> <span id="rx-patient"></span></p>
      <p style="font-size:14px;color:var(--slate);margin-bottom:14px"><strong>Doctor:</strong> <span id="rx-doctor"></span></p>
      <div id="rx-medicines" style="margin-bottom:16px"></div>
      <div class="err-msg" id="rx-modal-err" style="margin-bottom:12px"></div>
      <button class="btn btn-primary" id="rx-dispense-btn" style="width:100%" onclick="markRxDispensed()">Mark Dispensed</button>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../js/api.js?v=3"></script>
  <script>
    if (!requireAuth()) throw new Error("Not authenticated");
    if (getDoctor()?.role !== 'pharmacy') window.location.href = 'login.html';
    fillTopbar();

    let pharmCurrentStatus = 'not_marked';
    let queueData = [];
    let currentRxToken = null;
    let currentRxHash = null;

    async function loadPharmAttendance() {
      try {
        const data = await api("GET", "/doctors/attendance/my-status");
        renderPharmBadge(data.status);
      } catch (e) {}
    }

    function renderPharmBadge(status) {
      pharmCurrentStatus = status;
      const badge = document.getElementById('pharm-attendance-badge');
      const btnPresent = document.getElementById('pharm-btn-present');
      const btnBreak = document.getElementById('pharm-btn-break');
      const btnOffDuty = document.getElementById('pharm-btn-offduty');
      if (status === 'present') {
        badge.className = 'badge badge-green'; badge.textContent = 'Present';
        btnPresent.style.display = 'none'; btnBreak.style.display = ''; btnOffDuty.style.display = '';
      } else if (status === 'on_break') {
        badge.className = 'badge badge-amber'; badge.textContent = 'On Break';
        btnPresent.textContent = 'Resume'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = '';
      } else if (status === 'off_duty') {
        badge.className = 'badge badge-red'; badge.textContent = 'Off Duty';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      } else {
        badge.className = 'badge badge-grey'; badge.textContent = 'Not marked';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      }
    }

    async function markPharmAttendance(status) {
      try {
        const wasAlreadyPresent = pharmCurrentStatus === status;
        await api("POST", "/doctors/attendance", { status, room_id: null });
        renderPharmBadge(status);
        if (!wasAlreadyPresent) {
          const labels = { present: "Marked present.", on_break: "On break.", off_duty: "Marked off duty." };
          toast(labels[status] || "Status updated.", "success");
        }
      } catch (e) { toast(e.message, "error"); }
    }

    async function loadQueue() {
      try {
        queueData = await api("GET", "/pharmacy/queue");
        renderQueue();
      } catch (e) { toast(e.message, "error"); }
    }

    function timeSince(iso) {
      const utc = iso.endsWith("Z") ? iso : iso + "Z";
      const mins = Math.floor((Date.now() - new Date(utc).getTime()) / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins} min ago`;
      const hrs = Math.floor(mins / 60);
      return `${hrs} hr ${mins % 60}m ago`;
    }

    function renderQueue() {
      const el = document.getElementById('pharmacy-queue-list');
      const search = document.getElementById('pharm-search').value.trim().toLowerCase();
      const filter = document.getElementById('pharm-filter').value;

      let items = queueData;
      if (filter === 'pending') items = items.filter(i => !i.is_dispensed);
      if (filter === 'dispensed') items = items.filter(i => i.is_dispensed);
      if (search) {
        items = items.filter(i =>
          i.token_number.toLowerCase().includes(search) ||
          i.patient_name.toLowerCase().includes(search)
        );
      }

      if (!items.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:12px 0">No prescriptions found.</p>';
        return;
      }

      el.innerHTML = items.map(i => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;cursor:pointer"
          onclick="openPrescription('${i.token_number}')">
          <div style="flex:1;min-width:200px">
            <span class="badge badge-navy">${i.token_number}</span>
            <strong style="margin-left:8px">${sanitize(i.patient_name)}</strong>
          </div>
          <div style="font-size:12px;color:var(--slate);min-width:120px">${timeSince(i.confirmed_at)}</div>
          <div>${i.is_dispensed
            ? '<span class="badge badge-green">Dispensed</span>'
            : '<span class="badge badge-amber">Pending</span>'}</div>
        </div>
      `).join('');
    }

    async function openPrescription(tokenNumber) {
      try {
        const rx = await api("GET", `/pharmacy/prescription/${tokenNumber}`);
        currentRxToken = rx.token_number;
        currentRxHash = rx.verify_hash;

        document.getElementById('rx-token').textContent = rx.token_number;
        document.getElementById('rx-patient').textContent = `${rx.patient_name} · ${rx.patient_age}yr · ${rx.patient_gender}`;
        document.getElementById('rx-doctor').textContent = rx.doctor_name;

        const meds = rx.medicines || [];
        document.getElementById('rx-medicines').innerHTML = meds.length
          ? meds.map(m => `
              <div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:14px">
                <strong>${sanitize(m.name)}</strong>${m.brand_name ? ` (${sanitize(m.brand_name)})` : ''}
                <div style="color:var(--slate);font-size:12px">${sanitize(m.dosage || '')} — ${sanitize(m.frequency || '')}${m.duration ? ' × ' + sanitize(m.duration) : ''}</div>
              </div>
            `).join('')
          : '<p style="color:var(--slate-light)">No medicines listed.</p>';

        document.getElementById('rx-modal-err').textContent = '';
        const btn = document.getElementById('rx-dispense-btn');
        if (rx.is_dispensed) {
          btn.disabled = true;
          btn.textContent = 'Already Dispensed';
        } else {
          btn.disabled = false;
          btn.textContent = 'Mark Dispensed';
        }

        document.getElementById('modal-prescription').classList.add('open');
      } catch (e) { toast(e.message, "error"); }
    }

    function closePrescriptionModal() {
      document.getElementById('modal-prescription').classList.remove('open');
      currentRxToken = null;
      currentRxHash = null;
    }

    async function markRxDispensed() {
      if (!currentRxToken || !currentRxHash) return;
      const btn = document.getElementById('rx-dispense-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        await api("POST", `/consultations/verify/${currentRxToken}/dispense?hash=${encodeURIComponent(currentRxHash)}`, {});
        toast('Marked as dispensed.', 'success');
        closePrescriptionModal();
        loadQueue();
      } catch (e) {
        document.getElementById('rx-modal-err').textContent = e.message;
        btn.disabled = false;
        btn.textContent = 'Mark Dispensed';
      }
    }

    function sanitize(s) {
      if (window.sanitize) return window.sanitize(s);
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    loadPharmAttendance();
    loadQueue();
  </script>
</body>
</html>
