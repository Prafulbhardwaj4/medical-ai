<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedScribe — Health Records</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span>Patient</span>
      </div>
      <button class="profile-menu-item" onclick="openChangePasswordModal()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        Change Password
      </button>
      <button class="profile-menu-item danger" onclick="confirmDeactivateAccount()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
        Deactivate Account
      </button>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign out
      </button>
    </div>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <nav class="sidebar">
      <div class="sidebar-section-label" style="display:flex;justify-content:space-between;align-items:center">
        <span id="sidebar-doctor-name"></span>
        <button class="btn btn-outline btn-sm sidebar-signout-btn" onclick="logout()">Sign out</button>
      </div>
      <div class="sidebar-section-label">Navigation</div>
      <a class="nav-item" href="my-health.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Home
      </a>
      <a class="nav-item" href="my-appointments.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Appointments
      </a>
      <div class="nav-divider"></div>
      <div class="sidebar-section-label">Quick Links</div>
      <a class="nav-item active" href="my-records.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Health Records
      </a>
    </nav>

    <nav class="bottom-nav">
      <button class="bottom-nav-item" data-page="home" onclick="location.href='my-health.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"/></svg>
        Home
      </button>
      <button class="bottom-nav-item" data-page="appointments" onclick="location.href='my-appointments.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Appointments
      </button>
      <button class="bottom-nav-item active" data-page="records" onclick="location.href='my-records.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Records
      </button>
      <button class="bottom-nav-item" data-page="profile" onclick="toggleProfileMenu()">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
        Profile
      </button>
    </nav>

    <main class="main-content">
      <div style="margin-bottom:20px">
        <h1 id="page-title">Health Records</h1>
        <p id="page-subtitle">Select a profile to view its visit history.</p>
      </div>

      <div id="back-row" style="display:none;margin-bottom:14px">
        <button class="btn btn-outline btn-sm" onclick="showProfiles()">&larr; Back to Profiles</button>
      </div>

      <div id="content-area">
        <div class="card"><p>Loading...</p></div>
      </div>
    </main>
  </div>

  <!-- Visit detail modal -->
  <div class="modal-overlay" id="modal-visit-detail">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <h2>Visit Details</h2>
        <button class="modal-close" onclick="closeVisitModal()">&times;</button>
      </div>
      <div id="visit-modal-body">
        <p>Loading...</p>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (!requireAuth()) { }
    if (getDoctor()?.role !== 'patient') redirectByRole(getDoctor()?.role);
    fillTopbar();
    document.getElementById("profile-menu-name").textContent = getDoctor()?.name || "Patient";

    let allProfiles = [];
    let currentProfile = null;

    async function init() {
      const area = document.getElementById("content-area");
      try {
        allProfiles = await api("GET", "/portal/dashboard/profiles");
        if (!allProfiles.length) {
          area.innerHTML = `<div class="card"><p>No hospital records linked yet.</p></div>`;
          return;
        }
        if (allProfiles.length === 1) {
          // Only one profile — skip straight to its visits
          openProfile(allProfiles[0]);
        } else {
          showProfiles();
        }
      } catch (e) {
        area.innerHTML = `<div class="card"><p class="err-msg" style="display:block">${e.message}</p></div>`;
      }
    }

    function showProfiles() {
      currentProfile = null;
      document.getElementById("page-title").textContent = "Health Records";
      document.getElementById("page-subtitle").textContent = "Select a profile to view its visit history.";
      document.getElementById("back-row").style.display = "none";

      const area = document.getElementById("content-area");
      area.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px">` +
        allProfiles.map(p => `
          <div class="hosp-card" style="cursor:pointer" onclick='openProfile(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
            <h3>${sanitize(p.display_name)}</h3>
            <p style="font-size:13px;color:var(--slate);margin:6px 0">${sanitize(p.hospital_name)} · <span class="badge badge-grey">${p.relation}</span></p>
            <p style="font-size:13px;color:var(--teal);font-weight:500">${p.visit_count} visit${p.visit_count === 1 ? '' : 's'}</p>
          </div>`).join('') + `</div>`;
    }

    async function openProfile(profile) {
      currentProfile = profile;
      document.getElementById("page-title").textContent = `${profile.display_name}'s Records`;
      document.getElementById("page-subtitle").textContent = profile.hospital_name;
      document.getElementById("back-row").style.display = allProfiles.length > 1 ? "block" : "none";

      const area = document.getElementById("content-area");
      area.innerHTML = `<div class="card"><p>Loading visits...</p></div>`;

      try {
        const visits = await api("GET", `/portal/dashboard/profiles/${profile.id}/visits`);
        if (!visits.length) {
          area.innerHTML = `<div class="card"><p>No visit records yet.</p></div>`;
          return;
        }
        area.innerHTML = visits.map(v => `
          <div class="card" style="margin-bottom:12px;cursor:pointer" onclick="openVisit(${v.checkin_id})">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
              <div>
                <div style="font-weight:600">${sanitize(v.patient_name)}</div>
                <div style="font-size:13px;color:var(--slate);margin-top:2px">${sanitize(v.hospital_name)}${v.doctor_name ? ' · ' + sanitize(v.doctor_name) : ''}</div>
                <div style="font-size:12px;color:var(--slate-light);margin-top:4px">${new Date(v.visit_date).toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', day: 'numeric', month: 'short', year: 'numeric' })} · Token ${v.token_number}</div>
              </div>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${v.has_prescription ? '<span class="badge badge-teal">Prescription</span>' : ''}
                ${v.has_invoice ? '<span class="badge badge-navy">Invoice</span>' : ''}
                ${v.test_count > 0 ? `<span class="badge badge-grey">${v.test_count} Test${v.test_count === 1 ? '' : 's'}</span>` : ''}
              </div>
            </div>
          </div>`).join('');
      } catch (e) {
        area.innerHTML = `<div class="card"><p class="err-msg" style="display:block">${e.message}</p></div>`;
      }
    }

    async function openVisit(checkinId) {
      document.getElementById("modal-visit-detail").classList.add("open");
      const body = document.getElementById("visit-modal-body");
      body.innerHTML = `<p>Loading...</p>`;

      try {
        const v = await api("GET", `/portal/dashboard/visits/${checkinId}`);
        let html = `
          <div style="margin-bottom:16px">
            <div style="font-weight:600;font-size:1.05rem">${sanitize(v.patient_name)}</div>
            <div style="font-size:13px;color:var(--slate);margin-top:2px">${sanitize(v.hospital_name)}${v.doctor_name ? ' · ' + sanitize(v.doctor_name) : ''}</div>
            <div style="font-size:12px;color:var(--slate-light);margin-top:2px">${new Date(v.visit_date).toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', day: 'numeric', month: 'short', year: 'numeric' })} · Token ${v.token_number}</div>
          </div>`;

        if (v.consultation_id) {
          html += `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--border)">
              <div>
                <div style="font-weight:500">Prescription</div>
                <div style="font-size:12px;color:var(--slate-light)">${sanitize(v.diagnosis || 'Consultation')}</div>
              </div>
              <button class="btn btn-outline btn-sm" onclick="downloadFile('/portal/dashboard/prescriptions/${v.consultation_id}/pdf', '${v.token_number}.pdf')">Download</button>
            </div>`;
        }

        if (v.invoice_id) {
          html += `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--border)">
              <div style="font-weight:500">Invoice — ₹${v.invoice_total}</div>
              <button class="btn btn-outline btn-sm" onclick="downloadFile('/portal/dashboard/invoices/${v.invoice_id}/pdf', 'invoice_${v.invoice_id}.pdf')">Download</button>
            </div>`;
        }

        if (v.tests && v.tests.length) {
          html += `<div style="padding-top:12px;border-top:1px solid var(--border)"><div style="font-weight:500;margin-bottom:8px">Test Reports</div>`;
          html += v.tests.map(t => `
            <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px">
              <span>${sanitize(t.test_name)}</span>
              <span class="badge badge-grey">${t.status}</span>
            </div>`).join('');
          html += `</div>`;
        }

        if (!v.consultation_id && !v.invoice_id && (!v.tests || !v.tests.length)) {
          html += `<p style="color:var(--slate-light);font-size:13px;padding-top:12px">No documents available for this visit yet.</p>`;
        }

        body.innerHTML = html;
      } catch (e) {
        body.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`;
      }
    }

    function closeVisitModal() {
      document.getElementById("modal-visit-detail").classList.remove("open");
    }

    init();
  </script>
</body>

</html>
