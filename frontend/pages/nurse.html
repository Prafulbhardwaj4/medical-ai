<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nurse Station — MedScribe</title>
  <link rel="stylesheet" href="../css/style.css?v=4" />
  <style>
    /* Mobile tab sections: only one visible at a time on phones, all stacked normally on desktop */
    .mobile-section { display: none; }
    .mobile-section.active { display: block; }
    @media (min-width: 901px) {
      .mobile-section { display: block !important; margin-bottom: 20px; }
      #section-vitals, #section-tasks, #section-history, #section-attendance { display: none !important; }
      #section-vitals.d-active, #section-tasks.d-active, #section-history.d-active, #section-attendance.d-active { display: block !important; }
    }
    .desktop-tabs { display: none; }
    @media (min-width: 901px) {
      .desktop-tabs {
        display: flex;
        gap: 6px;
        border-bottom: 1.5px solid var(--border);
        margin-bottom: 20px;
      }
      .desktop-tab {
        padding: 10px 18px;
        font-size: 0.92rem;
        font-weight: 600;
        color: var(--slate);
        background: none;
        border: none;
        border-bottom: 2.5px solid transparent;
        cursor: pointer;
        margin-bottom: -1.5px;
        transition: color 0.15s ease, border-color 0.15s ease;
      }
      .desktop-tab:hover { color: var(--navy); }
      .desktop-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
    }

    /* Row cards used in vitals / tasks / history lists */
    .ns-row {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .ns-row-sub { color: var(--slate); font-size: 13px; margin-top: 4px; }
    .ns-row-note { color: var(--navy); font-size: 13px; margin-top: 4px; font-weight: 600; }
    .ns-row button { width: 100%; margin-top: 10px; }
    @media (min-width: 901px) {
      .ns-row {
        display: flex; justify-content: space-between; align-items: center;
        border: none; border-bottom: 1px solid var(--border); border-radius: 0;
        padding: 14px 0; margin-bottom: 0;
      }
      .ns-row button { width: auto; margin-top: 0; }
    }

    /* Attendance tab */
    .nurse-att-status { text-align: center; padding: 20px 0 16px; }
    .nurse-att-status .badge { font-size: 15px; padding: 8px 18px; }
    .nurse-att-actions { display: flex; flex-direction: column; gap: 10px; }
    .nurse-att-actions select { width: 100% !important; }
    @media (min-width: 901px) {
      .nurse-att-status { display: none; }
      .nurse-att-actions { flex-direction: row; flex-wrap: wrap; }
      .nurse-att-actions select { width: 170px !important; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <span id="topbar-clinic" style="color:var(--slate)"></span>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span id="profile-menu-clinic"></span>
      </div>
      <button class="profile-menu-item" onclick="closeProfileMenu();toast('Settings — Coming Soon','info')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        Settings
      </button>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign out
      </button>
    </div>

    <nav class="sidebar">
      <div class="sidebar-section-label">Navigation</div>
      <div class="nav-item active">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Nurse Station
      </div>
    </nav>

    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <nav class="bottom-nav">
      <button class="bottom-nav-item active" id="tab-btn-vitals" onclick="showNurseSection('vitals')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12h4l3 8 4-16 3 8h4" />
        </svg>
        Vitals
      </button>
      <button class="bottom-nav-item" id="tab-btn-tasks" onclick="showNurseSection('tasks')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        Tasks
      </button>
      <button class="bottom-nav-item" id="tab-btn-history" onclick="showNurseSection('history')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        History
      </button>
      <button class="bottom-nav-item" id="tab-btn-attendance" onclick="showNurseSection('attendance')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        Attendance
      </button>
    </nav>

    <main class="main-content">
      <div class="desktop-tabs">
        <button class="desktop-tab active" id="dtab-btn-home" onclick="showNurseDesktopTab('home')">Home</button>
        <button class="desktop-tab" id="dtab-btn-history" onclick="showNurseDesktopTab('history')">History</button>
        <button class="desktop-tab" id="dtab-btn-attendance" onclick="showNurseDesktopTab('attendance')">Attendance</button>
      </div>

      <!-- Attendance tab -->
      <div class="mobile-section" id="section-attendance">
        <div class="card">
          <div class="card-header" style="margin-bottom:0">
            <h2>Today's Status</h2>
          </div>
          <div class="staff-att-status">
            <span class="badge badge-grey" id="nurse-attendance-badge">Not marked</span>
            <div id="nurse-room-display" style="margin-top:6px;font-size:13px;color:var(--slate)"></div>
          </div>
          <div class="staff-att-actions" id="nurse-attendance-btns">
            <select class="form-control" id="nurse-room-select" style="display:none" onchange="markNurseAttendance(nurseCurrentStatus)"></select>
            <button class="btn btn-primary" id="nurse-btn-present" onclick="markNurseAttendance('present')">Mark Present</button>
            <button class="btn btn-outline" id="nurse-btn-break" onclick="markNurseAttendance('on_break')" style="display:none">On Break</button>
            <button class="btn btn-outline" id="nurse-btn-offduty" onclick="markNurseAttendance('off_duty')" style="display:none;color:var(--danger);border-color:var(--danger)">Off Duty</button>
          </div>
        </div>
      </div>

      <!-- Vitals tab -->
      <div class="mobile-section active" id="section-vitals">
        <div class="card">
          <div class="card-header"><h2>Vitals Queue</h2></div>
          <div id="vitals-list"><p style="color:var(--slate)">Loading…</p></div>
        </div>
      </div>

      <!-- Tasks tab -->
      <div class="mobile-section" id="section-tasks">
        <div class="card">
          <div class="card-header"><h2>Post-Consultation Tasks</h2></div>
          <div id="postconsult-list"><p style="color:var(--slate)">Loading…</p></div>
        </div>
      </div>

      <!-- History tab -->
      <div class="mobile-section" id="section-history">
        <div class="card">
          <div class="card-header"><h2>Recently Recorded</h2></div>
          <div id="history-list"><p style="color:var(--slate)">Loading…</p></div>
        </div>
      </div>

    </main>
  </div>

  <div class="modal-overlay" id="modal-vitals">
    <div class="modal" style="max-width:520px">
      <div class="modal-header">
        <h2>Record Vitals</h2>
        <button class="modal-close" onclick="closeVitalsModal()">×</button>
      </div>
      <p style="color:var(--slate);font-size:13px;margin-bottom:16px" id="vitals-modal-sub"></p>
      <div id="vitals-fields"></div>
      <button class="btn btn-outline btn-sm" style="margin:10px 0 20px" onclick="addVitalsField()">+ Add Field</button>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-outline" onclick="closeVitalsModal()">Cancel</button>
        <button class="btn btn-primary" id="btn-save-vitals" onclick="saveVitals()">Save Vitals</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-postconsult">
    <div class="modal" style="max-width:520px">
      <div class="modal-header">
        <h2>Complete Task</h2>
        <button class="modal-close" onclick="closePostConsultModal()">×</button>
      </div>
      <p style="color:var(--slate);font-size:13px;margin-bottom:4px">Doctor's note:</p>
      <p style="font-weight:600;margin-bottom:16px" id="postconsult-note"></p>
      <div id="postconsult-fields"></div>
      <button class="btn btn-outline btn-sm" style="margin:10px 0 20px" onclick="addPostConsultField()">+ Add Field</button>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-outline" onclick="closePostConsultModal()">Cancel</button>
        <button class="btn btn-primary" id="btn-save-postconsult" onclick="savePostConsult()">Mark Done</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../js/api.js?v=4"></script>
  <script>
    requireAuth();
    fillTopbar();
    if (getDoctor()?.role !== 'nurse') redirectByRole(getDoctor()?.role);

    function showNurseDesktopTab(id) {
      const groups = { home: ['vitals', 'tasks'], history: ['history'], attendance: ['attendance'] };
      ['vitals', 'tasks', 'history', 'attendance'].forEach(s => {
        document.getElementById('section-' + s).classList.remove('d-active');
      });
      groups[id].forEach(s => document.getElementById('section-' + s).classList.add('d-active'));
      ['home', 'history', 'attendance'].forEach(t => {
        document.getElementById('dtab-btn-' + t).classList.toggle('active', t === id);
      });
    }

    if (window.innerWidth >= 901) showNurseDesktopTab('home');

    function showNurseSection(id) {
      ['vitals', 'tasks', 'history', 'attendance'].forEach(s => {
        document.getElementById('section-' + s).classList.toggle('active', s === id);
        document.getElementById('tab-btn-' + s).classList.toggle('active', s === id);
      });
    }

    const STANDARD_VITALS = ["Blood Pressure", "Pulse", "Temperature", "SpO2", "Respiratory Rate", "Weight", "Height", "Blood Sugar (GRBS)"];
    let activeCheckinId = null;
    let activePostConsultId = null;

    const VITALS_RULES = {
      "Blood Pressure": { type: "bp", unit: "mmHg" },
      "Pulse": { type: "number", min: 30, max: 220, unit: "bpm" },
      "Temperature": { type: "number", min: 90, max: 110, unit: "°F" },
      "SpO2": { type: "number", min: 50, max: 100, unit: "%" },
      "Respiratory Rate": { type: "number", min: 8, max: 60, unit: "/min" },
      "Weight": { type: "number", min: 1, max: 300, unit: "kg" },
      "Height": { type: "number", min: 30, max: 250, unit: "cm" },
      "Blood Sugar (GRBS)": { type: "number", min: 20, max: 600, unit: "mg/dL" }
    };

    function validateVitalInput(input) {
      const row = input.closest('[data-row]');
      const warnEl = row.querySelector('[data-warn]');
      const ruleStr = input.getAttribute('data-rule');
      if (!ruleStr || !warnEl) return;
      const rule = JSON.parse(ruleStr.replace(/&#39;/g, "'"));
      const val = input.value.trim();
      if (!val) { warnEl.style.display = 'none'; input.style.borderColor = ''; return; }

      let msg = '';
      if (rule.type === 'bp') {
        if (!/^\d{2,3}\/\d{2,3}$/.test(val)) {
          msg = 'Enter as systolic/diastolic, numbers only — e.g. 120/80';
        } else {
          const [sys, dia] = val.split('/').map(Number);
          if (sys < 60 || sys > 260 || dia < 30 || dia > 160) msg = 'Outside the usual range — please double-check';
        }
      } else if (rule.type === 'number') {
        if (!/^\d+(\.\d+)?$/.test(val)) {
          msg = 'Numbers only';
        } else {
          const n = parseFloat(val);
          if (n < rule.min || n > rule.max) msg = `Outside the usual ${rule.min}–${rule.max} ${rule.unit} range — please double-check`;
        }
      }
      warnEl.textContent = msg;
      warnEl.style.display = msg ? 'block' : 'none';
      input.style.borderColor = msg ? 'var(--danger)' : '';
    }

    function fieldRow(label, value, locked, rule) {
      const ruleAttr = rule ? ` data-rule='${JSON.stringify(rule).replace(/'/g, "&#39;")}'` : '';
      const unitHtml = rule && rule.unit ? `<span style="font-size:12px;color:var(--slate);white-space:nowrap;align-self:center">${rule.unit}</span>` : '';
      return `
        <div style="margin-bottom:8px" data-row>
          <div style="display:flex;gap:8px;align-items:center">
            <input class="form-control" placeholder="Field" value="${(label || '').replace(/"/g, '&quot;')}" style="flex:1${locked ? ';background:var(--smoke,#f5f5f5);color:var(--navy);font-weight:600' : ''}" data-label ${locked ? 'readonly' : ''} />
            <input class="form-control" placeholder="Value" value="${(value || '').replace(/"/g, '&quot;')}" style="flex:1" data-value${ruleAttr} oninput="validateVitalInput(this)" />
            ${unitHtml}
          </div>
          <div style="font-size:12px;color:var(--danger);margin-top:2px;display:none" data-warn></div>
        </div>`;
    }

    function addVitalsField() {
      document.getElementById('vitals-fields').insertAdjacentHTML('beforeend', fieldRow('', ''));
    }
    function addPostConsultField() {
      document.getElementById('postconsult-fields').insertAdjacentHTML('beforeend', fieldRow('', ''));
    }

    function collectFields(containerId) {
      const data = {};
      document.querySelectorAll(`#${containerId} [data-row]`).forEach(row => {
        const label = row.querySelector('[data-label]').value.trim();
        const value = row.querySelector('[data-value]').value.trim();
        if (label && value) data[label] = value;
      });
      return data;
    }

    async function loadHistory() {
      try {
        const history = await api("GET", "/nurses/history");
        document.getElementById('history-list').innerHTML = history.length ? history.map(h => `
          <div class="ns-row">
            <div>
              <strong>${h.patient_name}</strong>
              <span class="badge badge-navy" style="margin-left:8px">${h.patient_uid}</span>
              <div class="ns-row-sub">Token ${h.token_number} · ${new Date(h.recorded_at).toLocaleTimeString('en-IN', {timeZone:'Asia/Kolkata', hour:'2-digit', minute:'2-digit'})}</div>
              <div class="ns-row-sub">${Object.entries(h.vitals_data).map(([k,v]) => `${k}: ${v}`).join(' · ')}</div>
            </div>
            <button class="btn btn-outline btn-sm" onclick='openVitalsModal(${h.checkin_id}, ${JSON.stringify(h.patient_name)}, ${JSON.stringify(h.vitals_data)})'>Edit</button>
          </div>
        `).join('') : '<p style="color:var(--slate-light);padding:12px 0">Nothing recorded yet today.</p>';
      } catch (e) { toast(e.message, "error"); }
    }

    async function loadQueues() {
      try {
        const vitals = await api("GET", "/nurses/vitals-queue");
        document.getElementById('vitals-list').innerHTML = vitals.length ? vitals.map(v => `
          <div class="ns-row">
            <div>
              <strong>${v.patient_name}</strong>
              <span class="badge badge-navy" style="margin-left:8px">${v.patient_uid}</span>
              <div class="ns-row-sub">Token ${v.token_number} · ${v.issue_category} · For ${v.doctor_name}</div>
            </div>
            <button class="btn btn-primary btn-sm" onclick='if(!isNursePresent()){toast("Mark yourself Present first.","info");return;} openVitalsModal(${v.checkin_id}, ${JSON.stringify(v.patient_name)})'>Record Vitals</button>
          </div>
        `).join('') : '<p style="color:var(--slate-light);padding:12px 0">No patients waiting for vitals.</p>';
      } catch (e) { toast(e.message, "error"); }

      try {
        const tasks = await api("GET", "/nurses/post-consult-queue");
        document.getElementById('postconsult-list').innerHTML = tasks.length ? tasks.map(t => `
          <div class="ns-row">
            <div>
              <strong>${t.patient_name}</strong>
              <span class="badge badge-navy" style="margin-left:8px">${t.patient_uid}</span>
              <div class="ns-row-sub">Token ${t.token_number} · From ${t.doctor_name}</div>
              <div class="ns-row-note">${t.note || ''}</div>
            </div>
            <button class="btn btn-primary btn-sm" onclick='if(!isNursePresent()){toast("Mark yourself Present first.","info");return;} openPostConsultModal(${t.checkin_id}, ${JSON.stringify(t.note || "")})'>Mark Done</button>
          </div>
        `).join('') : '<p style="color:var(--slate-light);padding:12px 0">No pending tasks.</p>';
      } catch (e) { toast(e.message, "error"); }
    }

    function openVitalsModal(checkinId, patientName, existingData) {
      activeCheckinId = checkinId;
      document.getElementById('vitals-modal-sub').textContent = patientName;
      const data = existingData || {};
      const usedLabels = new Set();
      const rows = STANDARD_VITALS.map(label => {
        usedLabels.add(label);
        return fieldRow(label, data[label] || '', true, VITALS_RULES[label]);
      });
      Object.keys(data).forEach(label => {
        if (!usedLabels.has(label)) rows.push(fieldRow(label, data[label]));
      });
      document.getElementById('vitals-fields').innerHTML = rows.join('');
      document.getElementById('modal-vitals').classList.add('open');
    }
    function closeVitalsModal() {
      document.getElementById('modal-vitals').classList.remove('open');
      activeCheckinId = null;
    }

    async function saveVitals() {
      const data = collectFields('vitals-fields');
      if (!Object.keys(data).length) { toast('Enter at least one vitals value.', 'error'); return; }
      const btn = document.getElementById('btn-save-vitals');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        await api("POST", `/nurses/vitals/${activeCheckinId}`, { data });
        toast('Vitals recorded.', 'success');
        closeVitalsModal();
        loadQueues();
        loadHistory();
      } catch (e) {
        toast(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Save Vitals';
      }
    }

    function openPostConsultModal(checkinId, note) {
      activePostConsultId = checkinId;
      document.getElementById('postconsult-note').textContent = note || '—';
      document.getElementById('postconsult-fields').innerHTML = fieldRow('Notes', '');
      document.getElementById('modal-postconsult').classList.add('open');
    }
    function closePostConsultModal() {
      document.getElementById('modal-postconsult').classList.remove('open');
      activePostConsultId = null;
    }

    async function savePostConsult() {
      const data = collectFields('postconsult-fields');
      const btn = document.getElementById('btn-save-postconsult');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        await api("POST", `/nurses/post-consult/${activePostConsultId}`, { data });
        toast('Task marked done.', 'success');
        closePostConsultModal();
        loadQueues();
      } catch (e) {
        toast(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Mark Done';
      }
    }

    let nurseCurrentStatus = 'not_marked';

    async function loadNurseRoomOptions(selectedId) {
      try {
        const rooms = await api("GET", "/admin/rooms?for_picker=nurse");
        document.getElementById('nurse-room-select').innerHTML =
          '<option value="">No room</option>' +
          rooms.map(r => `<option value="${r.id}" ${r.id === selectedId ? 'selected' : ''}>${r.display || r.name || r.room_number}</option>`).join('');
      } catch (e) { }
    }

    async function loadNurseAttendance() {
      try {
        const data = await api("GET", "/doctors/attendance/my-status");
        renderNurseBadge(data.status);
        await loadNurseRoomOptions(data.room_id);
      } catch(e) {}
    }

    function renderNurseBadge(status) {
      nurseCurrentStatus = status;
      const badge = document.getElementById('nurse-attendance-badge');
      const btnPresent = document.getElementById('nurse-btn-present');
      const btnBreak = document.getElementById('nurse-btn-break');
      const btnOffDuty = document.getElementById('nurse-btn-offduty');
      document.getElementById('nurse-room-select').style.display = (status === 'present' || status === 'on_break') ? '' : 'none';
      if (status === 'present') {
        badge.className = 'badge badge-green'; badge.textContent = 'Present';
        btnPresent.style.display = 'none'; btnBreak.style.display = ''; btnOffDuty.style.display = '';
      } else if (status === 'on_break') {
        badge.className = 'badge badge-amber'; badge.textContent = 'On Break';
        btnPresent.textContent = 'Resume'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = '';
      } else if (status === 'off_duty') {
        badge.className = 'badge badge-red'; badge.textContent = 'Off Duty';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      } else {
        badge.className = 'badge badge-grey'; badge.textContent = 'Not marked';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      }
    }

    async function markNurseAttendance(status) {
      try {
        const roomVal = document.getElementById('nurse-room-select').value;
        const room_id = roomVal ? parseInt(roomVal) : null;
        const wasAlreadyPresent = nurseCurrentStatus === status;
        await api("POST", "/doctors/attendance", { status, room_id });
        renderNurseBadge(status);
        if (!wasAlreadyPresent) {
          const labels = { present: "Marked present.", on_break: "On break.", off_duty: "Marked off duty." };
          toast(labels[status] || "Status updated.", "success");
        } else {
          toast("Room updated.", "success");
        }
      } catch (e) { toast(e.message, "error"); }
    }

    function isNursePresent() {
      const badge = document.getElementById('nurse-attendance-badge');
      return badge && (badge.textContent === 'Present' || badge.textContent === 'On Break');
    }

    loadNurseAttendance();
    loadQueues();
    loadHistory();
    setInterval(() => { loadQueues(); loadHistory(); }, 15000);
  </script>
</body>
</html>
