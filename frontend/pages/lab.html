<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab — MedScribe</title>
  <link rel="stylesheet" href="../css/style.css?v=4" />
  <style>
    /* Mobile tab sections: only one visible at a time on phones, all stacked normally on desktop */
    .mobile-section {
      display: none;
    }

    .mobile-section.active {
      display: block;
    }

    @media (min-width: 901px) {
      .mobile-section {
        display: block !important;
        margin-bottom: 20px;
      }
    }

    /* Attendance tab */
    .lab-att-status {
      text-align: center;
      padding: 24px 0 20px;
    }

    .lab-att-status .badge {
      font-size: 15px;
      padding: 8px 18px;
    }

    .lab-att-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    @media (min-width: 901px) {
      .lab-att-status {
        display: none;
      }

      .lab-att-actions {
        flex-direction: row;
        flex-wrap: wrap;
      }
    }

    /* Queue cards */
    .lq-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
    }

    .lq-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }

    .lq-name {
      font-size: 15px;
    }

    .lq-sub {
      font-size: 13px;
      color: var(--slate);
      margin-bottom: 2px;
    }

    .lq-wait {
      font-size: 12px;
      color: var(--slate-light);
      margin-bottom: 10px;
    }

    .lq-actions button {
      width: 100%;
    }

    @media (min-width: 901px) {
      .lq-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        border: none;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        padding: 12px 0;
      }

      .lq-top {
        flex: 1;
        min-width: 200px;
        display: block;
      }

      .lq-wait {
        min-width: 100px;
        margin-bottom: 0;
      }

      .lq-actions {
        display: flex;
        gap: 8px;
      }

      .lq-actions button {
        width: auto;
      }
    }

    /* Pending cards */
    .lp-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .lp-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
    }

    .lp-item:first-of-type {
      border-top: none;
    }

    .lp-item button {
      width: 100%;
    }

    @media (min-width: 901px) {
      .lp-item {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

      .lp-item button {
        width: auto;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <span id="topbar-clinic" style="color:var(--slate)"></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Sign out</button>
      </div>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span id="profile-menu-clinic"></span>
      </div>
      <button class="profile-menu-item" onclick="closeProfileMenu();toast('Settings — Coming Soon','info')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        Settings
      </button>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Sign out
      </button>
    </div>

    <nav class="sidebar">
      <div class="sidebar-section-label">Navigation</div>
      <div class="nav-item active">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 3h6m-6 0v5.586a1 1 0 01-.293.707L4.293 13.707A1 1 0 004 14.414V19a2 2 0 002 2h12a2 2 0 002-2v-4.586a1 1 0 00-.293-.707l-4.414-4.414A1 1 0 0115 8.586V3" />
        </svg>
        Lab Queue
      </div>
    </nav>

    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <nav class="bottom-nav">
      <button class="bottom-nav-item active" id="tab-btn-queue" onclick="showLabSection('queue')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 3h6m-6 0v5.586a1 1 0 01-.293.707L4.293 13.707A1 1 0 004 14.414V19a2 2 0 002 2h12a2 2 0 002-2v-4.586a1 1 0 00-.293-.707l-4.414-4.414A1 1 0 0115 8.586V3" />
        </svg>
        Queue
      </button>
      <button class="bottom-nav-item" id="tab-btn-pending" onclick="showLabSection('pending')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
        </svg>
        Pending
      </button>
      <button class="bottom-nav-item" id="tab-btn-attendance" onclick="showLabSection('attendance')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        Attendance
      </button>

    </nav>

    <main class="main-content">

      <!-- Attendance tab -->
      <div class="mobile-section" id="section-attendance">
        <div class="card">
          <div class="card-header" style="margin-bottom:0">
            <h2>Today's Status</h2>
          </div>
          <div class="lab-att-status">
            <span class="badge badge-grey" id="lab-attendance-badge">Not marked</span>
          </div>
          <div class="lab-att-actions">
            <button class="btn btn-primary" id="lab-btn-present" onclick="markLabAttendance('present')">Mark
              Present</button>
            <button class="btn btn-outline" id="lab-btn-break" onclick="markLabAttendance('on_break')"
              style="display:none">On Break</button>
            <button class="btn btn-outline" id="lab-btn-offduty" onclick="markLabAttendance('off_duty')"
              style="display:none;color:var(--danger);border-color:var(--danger)">Off Duty</button>
          </div>
        </div>
      </div>

      <!-- Queue tab -->
      <div class="mobile-section active" id="section-queue">
        <div class="card">
          <div class="card-header">
            <h2>Lab Queue</h2>
          </div>
          <div id="lab-queue-list">
            <p style="color:var(--slate)">Loading…</p>
          </div>
        </div>
      </div>

      <!-- Pending tab -->
      <div class="mobile-section" id="section-pending">
        <div class="card">
          <div class="card-header">
            <h2>Pending Tasks</h2>
          </div>
          <p style="font-size:13px;color:var(--slate);margin-bottom:10px">
            Search a patient who paid for a test but wasn't queued the same day — you can add them back to today's queue
            any time within their payment window.
          </p>
          <input class="form-control" id="lab-pending-search" placeholder="Search patient name, UID or token…"
            oninput="searchLabPendingTasks(this.value)" style="margin-bottom:12px" />
          <div id="lab-pending-results"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- Result Entry Modal -->
  <div class="modal-overlay" id="modal-result">
    <div class="modal">
      <div class="modal-header">
        <h2>Enter Results</h2>
        <button class="modal-close" onclick="closeResultModal()">×</button>
      </div>
      <p style="font-size:14px;color:var(--slate);margin-bottom:14px" id="result-test-label"></p>
      <div id="result-fields"></div>
      <div class="err-msg" id="result-modal-err" style="margin:12px 0"></div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-primary" style="flex:1" onclick="submitResult()">Save Results</button>
        <button class="btn btn-outline" style="flex:1" onclick="closeResultModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../js/api.js?v=4"></script>
  <script>
    if (!requireAuth()) throw new Error("Not authenticated");
    if (getDoctor()?.role !== 'lab') window.location.href = 'login.html';
    fillTopbar();

    let labCurrentStatus = 'not_marked';
    let currentOrderId = null;

    function showLabSection(id) {
      ['queue', 'pending', 'attendance'].forEach(s => {
        document.getElementById('section-' + s).classList.toggle('active', s === id);
        document.getElementById('tab-btn-' + s).classList.toggle('active', s === id);
      });
      if (id === 'pending') runLabPendingSearch(document.getElementById('lab-pending-search').value);
    }

    let labPendingSearchTimer;
    function searchLabPendingTasks(val) {
      clearTimeout(labPendingSearchTimer);
      labPendingSearchTimer = setTimeout(() => runLabPendingSearch(val), 350);
    }
    document.addEventListener('DOMContentLoaded', () => runLabPendingSearch(''));

    async function runLabPendingSearch(q) {
      try {
        const results = await api("GET", `/lab/pending-tasks?q=${encodeURIComponent(q)}`);
        renderLabPendingResults(results);
      } catch (e) { }
    }

    function renderLabPendingResults(results) {
      const el = document.getElementById('lab-pending-results');
      if (!results.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:8px 0">No pending tasks found for this search.</p>';
        return;
      }
      el.innerHTML = results.map(r => `
        <div class="lp-card">
          <strong>${sanitize(r.patient_name)}</strong> <span class="badge badge-navy">${sanitize(r.patient_uid)}</span>
          ${r.pending.map(p => `
            <div class="lp-item">
              <div style="font-size:13px">
                ${sanitize(p.test_name)} — Rs.${p.price}
                <div style="color:var(--slate);font-size:12px">Ordered by ${sanitize(p.doctor_name)} · paid ${p.paid_at ? new Date(p.paid_at + '+05:30').toLocaleDateString('en-IN') : '—'}</div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="requeueTestOrder(${p.order_id})">Requeue to Today</button>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    async function requeueTestOrder(orderId) {
      try {
        await api("POST", `/lab/orders/${orderId}/requeue`, {});
        toast('Requeued to today\'s list.', 'success');
        document.getElementById('lab-pending-search').value = '';
        document.getElementById('lab-pending-results').innerHTML = '';
        loadQueue();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function loadLabAttendance() {
      try {
        const data = await api("GET", "/doctors/attendance/my-status");
        renderLabBadge(data.status);
      } catch (e) { }
    }

    function renderLabBadge(status) {
      labCurrentStatus = status;
      const badge = document.getElementById('lab-attendance-badge');
      const btnPresent = document.getElementById('lab-btn-present');
      const btnBreak = document.getElementById('lab-btn-break');
      const btnOffDuty = document.getElementById('lab-btn-offduty');
      if (status === 'present') {
        badge.className = 'badge badge-green'; badge.textContent = 'Present';
        btnPresent.style.display = 'none'; btnBreak.style.display = ''; btnOffDuty.style.display = '';
      } else if (status === 'on_break') {
        badge.className = 'badge badge-amber'; badge.textContent = 'On Break';
        btnPresent.textContent = 'Resume'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = '';
      } else if (status === 'off_duty') {
        badge.className = 'badge badge-red'; badge.textContent = 'Off Duty';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      } else {
        badge.className = 'badge badge-grey'; badge.textContent = 'Not marked';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      }
    }

    function isLabPresent() {
      const badge = document.getElementById('lab-attendance-badge');
      return badge && (badge.textContent === 'Present' || badge.textContent === 'On Break');
    }

    async function markLabAttendance(status) {
      try {
        const wasAlreadyPresent = labCurrentStatus === status;
        await api("POST", "/doctors/attendance", { status, room_id: null });
        renderLabBadge(status);
        if (!wasAlreadyPresent) {
          const labels = { present: "Marked present.", on_break: "On break.", off_duty: "Marked off duty." };
          toast(labels[status] || "Status updated.", "success");
        }
      } catch (e) { toast(e.message, "error"); }
    }

    async function loadQueue() {
      try {
        const items = await api("GET", "/lab/queue");
        renderQueue(items);
      } catch (e) { toast(e.message, "error"); }
    }

    const STATUS_LABEL = {
      paid: "Payment Received",
      sample_collected: "Sample Collected",
      processing: "Processing",
      completed: "Completed"
    };
    const STATUS_BADGE = {
      paid: "badge-amber",
      sample_collected: "badge-navy",
      processing: "badge-teal",
      completed: "badge-green"
    };

    function renderQueue(items) {
      const el = document.getElementById('lab-queue-list');
      if (!items.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:12px 0">No tests waiting in queue.</p>';
        return;
      }
      el.innerHTML = items.map(o => `
        <div class="lq-card">
          <div class="lq-top">
            <div>
              <strong class="lq-name">${sanitize(o.patient_name)}</strong>
              <div class="lq-sub">Token ${sanitize(o.token_number)} · ${sanitize(o.test_name)}</div>
            </div>
            <span class="badge ${STATUS_BADGE[o.status] || 'badge-grey'}">${STATUS_LABEL[o.status] || o.status}</span>
          </div>
          <div class="lq-wait">${o.waiting_minutes != null ? o.waiting_minutes + ' min waiting' : '—'}</div>
          <div class="lq-actions">
            ${o.status === 'paid' ? `<button class="btn btn-outline btn-sm" onclick="advanceStatus(${o.id}, 'sample_collected')">Collect Sample</button>` : ''}
            ${o.status === 'sample_collected' ? `<button class="btn btn-outline btn-sm" onclick="if(!isLabPresent()){toast('Mark yourself Present first.','info');return;} advanceStatus(${o.id}, 'processing')">Mark Processing</button>` : ''}
            ${o.status === 'processing' ? `<button class="btn btn-primary btn-sm" onclick="if(!isLabPresent()){toast('Mark yourself Present first.','info');return;} openResultModal(${o.id}, '${sanitize(o.test_name)}')">Enter Results</button>` : ''}
            ${o.status === 'completed' ? `<button class="btn btn-outline btn-sm" onclick="downloadReport(${o.id})">Download Report</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function downloadReport(orderId) {
      try {
        const response = await fetch(`${BASE}/lab/orders/${orderId}/report`, {
          headers: { "Authorization": `Bearer ${getToken()}` }
        });
        if (!response.ok) throw new Error("Report not found");
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        window.open(url, "_blank");
      } catch (e) {
        toast("Could not load report", "error");
      }
    }

    async function advanceStatus(orderId, status) {
      try {
        await api("PATCH", `/lab/orders/${orderId}/status`, { status });
        toast('Status updated.', 'success');
        loadQueue();
      } catch (e) { toast(e.message, 'error'); }
    }

    function openResultModal(orderId, testLabel) {
      currentOrderId = orderId;
      document.getElementById('result-test-label').textContent = testLabel;
      document.getElementById('result-fields').innerHTML = `
        <div class="form-group">
          <label class="form-label">Result Value</label>
          <input class="form-control" id="result-value" placeholder="e.g. 13.5 g/dL" />
        </div>
        <div class="form-group">
          <label class="form-label">Flag</label>
          <select class="form-control" id="result-flag">
            <option value="N">Normal</option>
            <option value="H">High</option>
            <option value="L">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Notes (optional)</label>
          <input class="form-control" id="result-notes" placeholder="Any observations…" />
        </div>
      `;
      document.getElementById('result-modal-err').textContent = '';
      document.getElementById('modal-result').classList.add('open');
    }

    function closeResultModal() {
      document.getElementById('modal-result').classList.remove('open');
      currentOrderId = null;
    }

    async function submitResult() {
      const value = document.getElementById('result-value').value.trim();
      const errEl = document.getElementById('result-modal-err');
      if (!value) { errEl.textContent = 'Result value is required.'; return; }

      const results = {
        value,
        flag: document.getElementById('result-flag').value,
        notes: document.getElementById('result-notes').value.trim()
      };

      try {
        await api("POST", `/lab/orders/${currentOrderId}/result`, { results });
        await api("PATCH", `/lab/orders/${currentOrderId}/status`, { status: "completed" });
        toast('Results saved. Marked complete.', 'success');
        closeResultModal();
        loadQueue();
      } catch (e) { errEl.textContent = e.message; }
    }

    loadLabAttendance();
    loadQueue();
    setInterval(loadQueue, 15000);
  </script>
</body>

</html>
