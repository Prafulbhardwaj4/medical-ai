<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Receptionist — MedScribe</title>
  <link rel="stylesheet" href="../css/style.css?v=3" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">Med<span>Scribe</span></div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Sign out</button>
      </div>
    </header>

    <nav class="sidebar">
      <div class="sidebar-section-label">Navigation</div>
      <div class="nav-item active" onclick="openAddPatient()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        Add Patient
      </div>
    </nav>

    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <main class="main-content">
      <div class="card">
        <div class="card-header">
          <h2>Patients</h2>
          <div style="display:flex;gap:12px;align-items:center">
            <div class="search-wrap">
              <svg class="search-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path stroke-linecap="round" d="M21 21l-4.35-4.35" />
              </svg>
              <input class="form-control" id="search-input" placeholder="Search name, phone, ID…"
                oninput="searchPatients(this.value)" />
            </div>
            <button class="btn btn-primary" onclick="openAddPatient()">+ Add Patient</button>
          </div>
        </div>

        <div class="table-wrap">
          <table id="patient-table">
            <thead>
              <tr>
                <th>Patient</th>
                <th>ID</th>
                <th>Phone</th>
                <th>Age / Gender</th>
                <th>Last Visit</th>
              </tr>
            </thead>
            <tbody id="patient-tbody">
              <tr><td colspan="5"><div class="empty-state"><p>Loading patients…</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Patient Modal -->
  <div class="modal-overlay" id="modal-add">
    <div class="modal">
      <div class="modal-header">
        <h2>Add New Patient</h2>
        <button class="modal-close" onclick="closeAddPatient()">×</button>
      </div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-control" id="p-name" placeholder="Ramesh Kumar" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone (with country code)</label>
          <div style="display:flex;gap:0;align-items:stretch">
            <span style="padding:9px 12px;background:var(--smoke-mid);border:1.5px solid var(--border);border-right:none;border-radius:var(--radius) 0 0 var(--radius);font-size:0.9rem;color:var(--slate);white-space:nowrap;font-weight:500;display:flex;align-items:center">+91</span>
            <input class="form-control" id="p-phone" type="tel" placeholder="9876543210" maxlength="10"
              style="border-radius:0 var(--radius) var(--radius) 0" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Age</label>
          <input class="form-control" id="p-age" type="number" placeholder="35" min="0" max="120" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Blood Group (optional)</label>
        <select class="form-control" id="p-blood-group">
          <option value="">Unknown</option>
          <option value="A+">A+</option><option value="A-">A-</option>
          <option value="B+">B+</option><option value="B-">B-</option>
          <option value="AB+">AB+</option><option value="AB-">AB-</option>
          <option value="O+">O+</option><option value="O-">O-</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Gender</label>
        <select class="form-control" id="p-gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
        <button class="btn btn-outline" onclick="closeAddPatient()">Cancel</button>
        <button class="btn btn-primary" id="btn-save-patient" onclick="savePatient()">Save Patient</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="../js/api.js?v=3"></script>
  <script>
    if (!requireAuth()) throw new Error("Not authenticated");
    fillTopbar();
    if (getDoctor()?.role !== 'receptionist') window.location.href = 'login.html';

    let totalPatientCount = 0;

    async function loadPatients(search = "") {
      try {
        const data = await api("GET", `/patients/?search=${encodeURIComponent(search)}`);
        renderTable(data);
      } catch (e) { toast(e.message, "error"); }
    }

    function renderTable(patients) {
      const tbody = document.getElementById("patient-tbody");
      if (!patients.length) {
        tbody.innerHTML = `<tr><td colspan="5">
          <div class="empty-state">
            <h3>No patients yet</h3>
            <p>Click "Add Patient" to register your first patient.</p>
          </div>
        </td></tr>`;
        return;
      }
      tbody.innerHTML = patients.map(p => `
        <tr>
          <td><strong>${p.name}</strong></td>
          <td><span class="badge badge-navy">${p.patient_uid}</span></td>
          <td style="color:var(--slate)">${p.phone}</td>
          <td>${p.age}y / ${capitalize(p.gender)}</td>
          <td>${p.last_visit ? formatDate(p.last_visit) : '<span style="color:var(--slate-light)">—</span>'}</td>
        </tr>
      `).join("");
    }

    let searchTimer;
    function searchPatients(val) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadPatients(val), 400);
    }

    function openAddPatient() { document.getElementById("modal-add").classList.add("open"); }
    function closeAddPatient() { document.getElementById("modal-add").classList.remove("open"); }

    async function savePatient() {
      const btn = document.getElementById("btn-save-patient");
      btn.disabled = true;
      const verr = validatePatient(
        document.getElementById("p-name").value,
        "+91" + document.getElementById("p-phone").value.trim(),
        document.getElementById("p-age").value
      );
      if (verr) { toast(verr, "error"); btn.disabled = false; btn.textContent = "Save Patient"; return; }
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        await api("POST", "/patients/", {
          name: document.getElementById("p-name").value.trim(),
          phone: "+91" + document.getElementById("p-phone").value.trim(),
          age: parseInt(document.getElementById("p-age").value),
          blood_group: document.getElementById("p-blood-group").value || null,
          gender: document.getElementById("p-gender").value
        });
        toast("Patient added successfully", "success");
        closeAddPatient();
        loadPatients();
      } catch (e) {
        toast(e.message, "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Save Patient";
      }
    }

    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    loadPatients();
  </script>
</body>
</html>
