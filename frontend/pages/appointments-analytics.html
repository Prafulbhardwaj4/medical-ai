<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedScribe — Appointment Analytics</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .doc-count-card {
      border: 1px solid var(--border); border-radius: 12px; padding: 18px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .doc-count-card .num { font-size: 1.8rem; font-weight: 800; color: var(--teal); }
  </style>
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span id="profile-menu-clinic"></span>
      </div>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign out
      </button>
    </div>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <nav class="sidebar">
      <div class="sidebar-section-label" style="display:flex;justify-content:space-between;align-items:center">
        <span id="sidebar-doctor-name"></span>
        <button class="btn btn-outline btn-sm sidebar-signout-btn" onclick="logout()">Sign out</button>
      </div>
      <div class="sidebar-section-label">Navigation</div>
      <a class="nav-item" href="dashboard.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="doctor-slots.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        My Availability
      </a>
      <a class="nav-item active" href="appointments-analytics.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 012-2h2a2 2 0 012 2v6m-9 0h14M5 19V9m14 10V5"/></svg>
        Appointment Analytics
      </a>
    </nav>

    <nav class="bottom-nav">
      <button class="bottom-nav-item active" onclick="location.href='appointments-analytics.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 012-2h2a2 2 0 012 2v6m-9 0h14M5 19V9m14 10V5"/></svg>
        Analytics
      </button>
      <button class="bottom-nav-item" onclick="location.href='dashboard.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"/></svg>
        Dashboard
      </button>
    </nav>

    <main class="main-content">
      <div style="margin-bottom:20px">
        <h1>Appointment Analytics</h1>
        <p style="color:var(--slate)">Paid Health Portal appointments over the last 45 days.</p>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div class="card-header" style="flex-wrap:wrap;gap:10px">
          <h2>Total: <span id="total-count">—</span></h2>
          <select class="form-control" id="doctor-filter" style="max-width:220px">
            <option value="">All doctors</option>
          </select>
        </div>
      </div>

      <div id="doctor-counts" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px">
        <p>Loading...</p>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (!requireAuth()) { }
    fillTopbar();
    document.getElementById("profile-menu-name").textContent = `${getDoctor()?.title || ''} ${getDoctor()?.name || ''}`.trim();

    document.getElementById("doctor-filter").addEventListener("change", loadAnalytics);

    async function loadAnalytics() {
      const grid = document.getElementById("doctor-counts");
      const doctorId = document.getElementById("doctor-filter").value;
      grid.innerHTML = `<p>Loading...</p>`;
      try {
        const path = doctorId ? `/portal-appointments-staff/analytics?doctor_id=${doctorId}` : `/portal-appointments-staff/analytics`;
        const data = await api("GET", path);
        document.getElementById("total-count").textContent = data.total;

        const filterSel = document.getElementById("doctor-filter");
        if (!doctorId) {
          const seen = new Set(Array.from(filterSel.options).map(o => o.value));
          data.by_doctor.forEach(d => {
            if (!seen.has(String(d.doctor_id))) {
              seen.add(String(d.doctor_id));
              const opt = document.createElement("option");
              opt.value = d.doctor_id;
              opt.textContent = d.doctor_name;
              filterSel.appendChild(opt);
            }
          });
        }

        if (!data.by_doctor.length) { grid.innerHTML = `<p style="color:var(--slate-light)">No paid appointments in the last 45 days.</p>`; return; }
        grid.innerHTML = data.by_doctor.map(d => `
          <div class="doc-count-card">
            <div>
              <div style="font-weight:600;color:var(--navy)">${sanitize(d.doctor_name)}</div>
              <div style="font-size:12px;color:var(--slate-light)">Last 45 days</div>
            </div>
            <div class="num">${d.appointment_count}</div>
          </div>`).join('');
      } catch (e) {
        grid.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`;
      }
    }

    loadAnalytics();
  </script>
</body>

</html>
