<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedScribe — Home</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .mobile-section { display: none; }
    .mobile-section.active { display: block; }
    @media (min-width: 901px) {
      .mobile-section { display: block !important; }
    }
    .avatar-circle {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--teal-subtle); color: var(--teal);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
    }
    .visit-card {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 16px; border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 12px; cursor: pointer; transition: box-shadow .15s, border-color .15s;
      background: var(--white);
    }
    .visit-card:hover { box-shadow: var(--shadow-sm); border-color: var(--border-mid); }
    .stat-card {
      background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 22px 18px; text-align: center;
    }
    .stat-card .num { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-card .label { font-size: 12.5px; color: var(--slate); margin-top: 8px; font-weight: 500; }
  </style>
</head>

<body>
  <div class="app-shell">

    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span>Patient</span>
      </div>
      <button class="profile-menu-item" onclick="openChangePasswordModal()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        Change Password
      </button>
      <button class="profile-menu-item danger" onclick="confirmDeactivateAccount()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
        Deactivate Account
      </button>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign out
      </button>
    </div>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <nav class="sidebar">
      <div class="sidebar-section-label" style="display:flex;justify-content:space-between;align-items:center">
        <span id="sidebar-doctor-name"></span>
        <button class="btn btn-outline btn-sm sidebar-signout-btn" onclick="logout()">Sign out</button>
      </div>
      <div class="sidebar-section-label">Navigation</div>
      <a class="nav-item active" href="my-health.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Home
      </a>
      <a class="nav-item" href="my-appointments.html">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Appointments
      </a>
    </nav>

    <nav class="bottom-nav">
      <button class="bottom-nav-item active" id="bn-stats" onclick="showMobileSection('stats')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"/></svg>
        Home
      </button>
      <button class="bottom-nav-item" id="bn-records" onclick="showMobileSection('records')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Records
      </button>
      <button class="bottom-nav-item" onclick="location.href='my-appointments.html'">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Appointments
      </button>
    </nav>

    <main class="main-content">

      <div class="mobile-section active" id="section-stats">
        <div style="margin-bottom:20px">
          <h1 id="welcome-heading">Welcome</h1>
          <p style="color:var(--slate)">Here's a quick look at your MedScribe Health Portal.</p>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px">
          <div class="stat-card"><div class="num" style="color:var(--teal)" id="stat-profiles">—</div><div class="label">Linked Profiles</div></div>
          <div class="stat-card"><div class="num" style="color:var(--navy)" id="stat-consultations">—</div><div class="label">Consultations</div></div>
          <div class="stat-card"><div class="num" style="color:var(--teal)" id="stat-visits-total">—</div><div class="label">Total Hospital Visits</div></div>
          <div class="stat-card"><div class="num" style="color:var(--navy)" id="stat-visits-30d">—</div><div class="label">Visits (Last 30 Days)</div></div>
        </div>

        <div class="card">
          <div class="card-header"><h2>Quick Links</h2></div>
          <div style="display:flex;flex-wrap:wrap;gap:12px">
            <button class="btn btn-primary" onclick="location.href='my-appointments.html'">Book an Appointment</button>
            <button class="btn btn-outline" onclick="showMobileSection('records')">View Health Records</button>
          </div>
        </div>
      </div>

      <div class="mobile-section" id="section-records" style="margin-top:24px">
        <div class="card-header" style="margin-bottom:14px">
          <h2>Health Records</h2>
        </div>

        <div class="card" style="margin-bottom:16px">
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px" id="filter-grid">
            <div class="form-group" style="margin:0">
              <label class="form-label">Search</label>
              <input class="form-control" id="search-input" placeholder="Search by hospital, doctor, token..." oninput="applyFilters()" />
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Hospital</label>
              <select class="form-control" id="filter-hospital" onchange="applyFilters()"><option value="">All hospitals</option></select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Patient</label>
              <select class="form-control" id="filter-patient" onchange="applyFilters()"><option value="">All profiles</option></select>
            </div>
          </div>
        </div>

        <div id="records-list"><p>Loading...</p></div>
      </div>

    </main>
  </div>

  <!-- Visit detail modal -->
  <div class="modal-overlay" id="modal-visit-detail">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <h2>Visit Details</h2>
        <button class="modal-close" onclick="closeVisitModal()">&times;</button>
      </div>
      <div id="visit-modal-body"><p>Loading...</p></div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (!requireAuth()) { }
    if (getDoctor()?.role !== 'patient') redirectByRole(getDoctor()?.role);
    fillTopbar();
    document.getElementById("profile-menu-name").textContent = getDoctor()?.name || "Patient";
    document.getElementById("welcome-heading").textContent = `Welcome, ${getDoctor()?.name || "Patient"}`;

    function showMobileSection(id) {
      ['stats', 'records'].forEach(s => {
        document.getElementById('section-' + s).classList.toggle('active', s === id);
        const btn = document.getElementById('bn-' + s);
        if (btn) btn.classList.toggle('active', s === id);
      });
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'records') showMobileSection('records');

    function initials(name) {
      if (!name) return "?";
      return name.trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join('');
    }

    let allVisits = [];

    async function loadStats() {
      try {
        const stats = await api("GET", "/portal/dashboard/stats");
        document.getElementById("stat-profiles").textContent = stats.profile_count;
        document.getElementById("stat-consultations").textContent = stats.consultation_count;
        document.getElementById("stat-visits-total").textContent = stats.visit_count_total;
        document.getElementById("stat-visits-30d").textContent = stats.visit_count_last_30_days;
      } catch (e) { toast(e.message, "error"); }
    }

    async function loadRecords() {
      const list = document.getElementById("records-list");
      try {
        allVisits = await api("GET", "/portal/dashboard/visits");

        const hospitals = [...new Set(allVisits.map(v => v.hospital_name))].sort();
        const patients = [...new Set(allVisits.map(v => v.patient_name))].sort();
        document.getElementById("filter-hospital").innerHTML = `<option value="">All hospitals</option>` + hospitals.map(h => `<option value="${sanitize(h)}">${sanitize(h)}</option>`).join('');
        document.getElementById("filter-patient").innerHTML = `<option value="">All profiles</option>` + patients.map(p => `<option value="${sanitize(p)}">${sanitize(p)}</option>`).join('');

        renderVisits(allVisits);
      } catch (e) {
        list.innerHTML = `<div class="card"><p class="err-msg" style="display:block">${e.message}</p></div>`;
      }
    }

    function applyFilters() {
      const q = document.getElementById("search-input").value.trim().toLowerCase();
      const hospital = document.getElementById("filter-hospital").value;
      const patient = document.getElementById("filter-patient").value;

      let filtered = allVisits;
      if (hospital) filtered = filtered.filter(v => v.hospital_name === hospital);
      if (patient) filtered = filtered.filter(v => v.patient_name === patient);
      if (q) filtered = filtered.filter(v =>
        (v.hospital_name || '').toLowerCase().includes(q) ||
        (v.doctor_name || '').toLowerCase().includes(q) ||
        (v.token_number || '').toLowerCase().includes(q) ||
        (v.patient_name || '').toLowerCase().includes(q)
      );
      renderVisits(filtered);
    }

    function renderVisits(visits) {
      const list = document.getElementById("records-list");
      if (!visits.length) {
        list.innerHTML = `<div class="card"><p style="color:var(--slate-light)">No visit records match your search.</p></div>`;
        return;
      }
      list.innerHTML = visits.map(v => `
        <div class="visit-card" onclick="openVisit(${v.checkin_id})">
          <div class="avatar-circle">${initials(v.patient_name)}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
              <div>
                <div style="font-weight:600">${sanitize(v.patient_name)}</div>
                <div style="font-size:13px;color:var(--slate);margin-top:2px">${sanitize(v.hospital_name)}${v.doctor_name ? ' · ' + sanitize(v.doctor_name) : ''}</div>
                <div style="font-size:12px;color:var(--slate-light);margin-top:4px">${new Date(v.visit_date).toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', day: 'numeric', month: 'short', year: 'numeric' })} · Token ${v.token_number}</div>
              </div>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${v.has_prescription ? '<span class="badge badge-teal">Prescription</span>' : ''}
                ${v.has_invoice ? '<span class="badge badge-navy">Invoice</span>' : ''}
                ${v.test_count > 0 ? `<span class="badge badge-grey">${v.test_count} Test${v.test_count === 1 ? '' : 's'}</span>` : ''}
              </div>
            </div>
          </div>
        </div>`).join('');
    }

    async function openVisit(checkinId) {
      document.getElementById("modal-visit-detail").classList.add("open");
      const body = document.getElementById("visit-modal-body");
      body.innerHTML = `<p>Loading...</p>`;
      try {
        const v = await api("GET", `/portal/dashboard/visits/${checkinId}`);
        let html = `
          <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px">
            <div class="avatar-circle">${initials(v.patient_name)}</div>
            <div>
              <div style="font-weight:600;font-size:1.05rem">${sanitize(v.patient_name)}</div>
              <div style="font-size:13px;color:var(--slate)">${sanitize(v.hospital_name)}${v.doctor_name ? ' · ' + sanitize(v.doctor_name) : ''}</div>
              <div style="font-size:12px;color:var(--slate-light)">${new Date(v.visit_date).toLocaleDateString('en-IN', { timeZone: 'Asia/Kolkata', day: 'numeric', month: 'short', year: 'numeric' })} · Token ${v.token_number}</div>
            </div>
          </div>`;

        if (v.consultation_id) {
          html += `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--border)">
              <div><div style="font-weight:500">Prescription</div><div style="font-size:12px;color:var(--slate-light)">${sanitize(v.diagnosis || 'Consultation')}</div></div>
              <button class="btn btn-outline btn-sm" onclick="downloadFile('/portal/dashboard/prescriptions/${v.consultation_id}/pdf', '${v.token_number}.pdf')">Download</button>
            </div>`;
        }
        if (v.invoice_id) {
          html += `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--border)">
              <div style="font-weight:500">Invoice — ₹${v.invoice_total}</div>
              <button class="btn btn-outline btn-sm" onclick="downloadFile('/portal/dashboard/invoices/${v.invoice_id}/pdf', 'invoice_${v.invoice_id}.pdf')">Download</button>
            </div>`;
        }
        if (v.tests && v.tests.length) {
          html += `<div style="padding-top:12px;border-top:1px solid var(--border)"><div style="font-weight:500;margin-bottom:8px">Test Reports</div>`;
          html += v.tests.map(t => `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span>${sanitize(t.test_name)}</span><span class="badge badge-grey">${t.status}</span></div>`).join('');
          html += `</div>`;
        }
        if (!v.consultation_id && !v.invoice_id && (!v.tests || !v.tests.length)) {
          html += `<p style="color:var(--slate-light);font-size:13px;padding-top:12px">No documents available for this visit yet.</p>`;
        }
        body.innerHTML = html;
      } catch (e) {
        body.innerHTML = `<p class="err-msg" style="display:block">${e.message}</p>`;
      }
    }

    function closeVisitModal() {
      document.getElementById("modal-visit-detail").classList.remove("open");
    }

    loadStats();
    loadRecords();
  </script>
</body>

</html>
