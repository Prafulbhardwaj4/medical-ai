        <button class="btn btn-outline btn-sm" onclick="setStaffFilter('doctor')" id="sf-doctor">Doctors</button>
        <button class="btn btn-outline btn-sm" onclick="setStaffFilter('sub_admin')" id="sf-sub_admin">Sub Admins</button>
        <button class="btn btn-outline btn-sm" onclick="setStaffFilter('receptionist')" id="sf-receptionist">Receptionists</button>

        </div>
        <div class="card">
          <div class="card-header"><h2>Current Attendance</h2></div>

      </div>

  <div id="toast"></div>
  <script src="../js/api.js?v=4"></script>
  <script>
    const doc = getDoctor();
    if (!doc || !["admin", "sub_admin"].includes(doc.role)) window.location.href = "dashboard.html";
    if (!requireAuth()) throw new Error("Not authenticated");
    fillTopbar();
    if (doc.billing_enabled) document.getElementById('nav-billing-link').style.display = '';

    let staffFilter = 'all';
    let allStaff = [];
    function setStaffFilter(f) {
      staffFilter = f;
      ['all', 'doctor', 'sub_admin', 'receptionist', 'nurse'].forEach(x => {
        const btn = document.getElementById(`sf-${x}`);
        btn.className = x === f ? 'btn btn-sm' : 'btn btn-outline btn-sm';
        if (x === f) btn.style.cssText = 'background:var(--teal);color:white;border-color:var(--teal)';
        else btn.style.cssText = '';
      });
      renderStaffList();
    }
    function renderStaffList() {
      const list = staffFilter === 'all' ? allStaff : allStaff.filter(d => d.role === staffFilter);
      const roleLabels = { doctor: 'Doctor', sub_admin: 'Sub Admin', nurse: 'Nurse', receptionist: 'Receptionist' };
      document.getElementById('attendance-list').innerHTML = list.length ? list.map(d => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)">
            <div>
              <strong>${d.name}</strong>
              <span style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;background:#f1f5f9;color:#64748b;margin-left:6px">${roleLabels[d.role] || d.role}</span>
              <div style="color:var(--slate);font-size:13px;margin-top:2px">${d.specialization}${d.room_number && d.room_number !== '—' ? ` · Room ${d.room_number}` : ''}</div>
            </div>
            ${badgeFor(d.status)}
          </div>
        `).join('') : `<p style="color:var(--slate-light);padding:12px 0">No ${staffFilter === 'all' ? 'staff' : staffFilter + 's'} found.</p>`;
    }

    function badgeFor(status) {
      if (status === 'present') return '<span class="badge badge-green">Present</span>';
      if (status === 'on_break') return '<span class="badge badge-amber">On Break</span>';
      if (status === 'off_duty') return '<span class="badge badge-red">Off Duty</span>';
      if (status === 'absent') return '<span class="badge badge-red">Absent</span>';
      return '<span class="badge badge-grey">Not marked</span>';
    }

    async function loadAttendance() {
      try {
        allStaff = await api("GET", "/doctors/attendance/today");
        renderStaffList();
      } catch (e) { toast(e.message, "error"); }
    }

    loadAttendance();
    setInterval(loadAttendance, 30000);
  </script>
