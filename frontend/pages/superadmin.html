<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — MedScribe</title>
  <link rel="stylesheet" href="../css/style.css?v=3" />
</head>
<body>
  <div class="app-shell">

    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="topbar-brand">Med<span>Scribe</span> <span style="color:var(--slate);font-size:0.75rem;margin-left:8px">Super Admin</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
    </header>

    <nav class="sidebar">
      <div class="sidebar-section-label">Navigation</div>
      <a class="nav-item active" href="superadmin.html">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
        Hospitals
      </a>
    </nav>

    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <main class="main-content">

      <!-- Create Hospital -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <h2>Hospitals</h2>
        <button class="btn btn-primary" onclick="openHospitalModal()">+ Add Hospital</button>
      </div>

      <div class="card" id="hospitals-list" style="margin-bottom:32px">
        <p>Loading...</p>
      </div>

    </main>
  </div>

  <!-- Add Hospital Modal -->
  <div id="hospital-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center">
    <div class="card" style="width:100%;max-width:480px;margin:24px">
      <h3 style="margin-bottom:20px">Add Hospital</h3>
      <input class="form-control" id="h-name" placeholder="Hospital Name" style="margin-bottom:14px" />
      <input class="form-control" id="h-city" placeholder="City" style="margin-bottom:14px" />
      <input class="form-control" id="h-state" placeholder="State" style="margin-bottom:14px" />
      <input class="form-control" id="h-address" placeholder="Address (optional)" style="margin-bottom:20px" />
      <div class="err-msg" id="hospital-err" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-primary" style="flex:1" onclick="submitHospital()">Create Hospital</button>
        <button class="btn btn-outline" style="flex:1" onclick="closeHospitalModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add Admin Modal -->
  <div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center">
    <div class="card" style="width:100%;max-width:480px;margin:24px">
      <h3 style="margin-bottom:4px">Add Admin</h3>
      <p style="margin-bottom:20px;font-size:13px" id="admin-modal-hospital-name"></p>
      <input class="form-control" id="a-name" placeholder="Full Name" style="margin-bottom:14px" />
      <input class="form-control" id="a-email" type="email" placeholder="Email" style="margin-bottom:14px" />
      <input class="form-control" id="a-phone" placeholder="Phone e.g. +919876543210" style="margin-bottom:14px" />
      <input class="form-control" id="a-specialization" placeholder="Specialization" style="margin-bottom:14px" />
      <input class="form-control" id="a-password" type="password" placeholder="Temporary Password" style="margin-bottom:20px" />
      <div class="err-msg" id="admin-err" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-primary" style="flex:1" onclick="submitAdmin()">Create Admin</button>
        <button class="btn btn-outline" style="flex:1" onclick="closeAdminModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../js/api.js?v=3"></script>
  <script>
    requireAuth();
    fillTopbar();

    const doc = getDoctor();
    if (doc && doc.role !== 'super_admin') window.location.href = 'analytics.html';

    let selectedHospitalId = null;

    loadHospitals();

    async function loadHospitals() {
      const container = document.getElementById('hospitals-list');
      try {
        const data = await api('GET', '/admin/hospitals-list');
        if (!data || data.length === 0) {
          container.innerHTML = '<p style="color:var(--slate)">No hospitals yet.</p>';
          return;
        }
        container.innerHTML = data.map(h => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)">
            <div>
              <div style="font-weight:600">${sanitize(h.name)}</div>
              <div style="color:var(--slate);font-size:13px">${sanitize(h.city)} · Code: ${sanitize(h.hospital_code)}</div>
              <div style="font-size:13px;margin-top:4px">
                <span class="badge ${h.is_active ? 'badge-teal' : 'badge-grey'}">${h.is_active ? 'Active' : 'Inactive'}</span>
              </div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="openAdminModal(${h.id}, '${sanitize(h.name)}')">+ Add Admin</button>
          </div>
        `).join('');
      } catch(e) {
        container.innerHTML = '<p style="color:var(--slate)">Failed to load hospitals.</p>';
      }
    }

    function openHospitalModal() {
      document.getElementById('hospital-modal').style.display = 'flex';
    }
    function closeHospitalModal() {
      document.getElementById('hospital-modal').style.display = 'none';
      document.getElementById('hospital-err').textContent = '';
    }

    async function submitHospital() {
      const err = document.getElementById('hospital-err');
      const name = document.getElementById('h-name').value.trim();
      const city = document.getElementById('h-city').value.trim();
      const state = document.getElementById('h-state').value.trim();
      const address = document.getElementById('h-address').value.trim();

      if (!name || !city || !state) {
        err.textContent = 'Name, city and state are required.';
        return;
      }

      const params = new URLSearchParams({ name, city, state, address });
      try {
        await api('POST', `/admin/hospitals-jwt?${params.toString()}`);
        toast('Hospital created successfully.', 'success');
        closeHospitalModal();
        loadHospitals();
      } catch(e) {
        err.textContent = e.message;
      }
    }

    function openAdminModal(hospitalId, hospitalName) {
      selectedHospitalId = hospitalId;
      document.getElementById('admin-modal-hospital-name').textContent = `For: ${hospitalName}`;
      document.getElementById('admin-modal').style.display = 'flex';
    }
    function closeAdminModal() {
      document.getElementById('admin-modal').style.display = 'none';
      document.getElementById('admin-err').textContent = '';
      selectedHospitalId = null;
    }

    async function submitAdmin() {
      const err = document.getElementById('admin-err');
      const name = document.getElementById('a-name').value.trim();
      const email = document.getElementById('a-email').value.trim();
      const phone = document.getElementById('a-phone').value.trim();
      const specialization = document.getElementById('a-specialization').value.trim();
      const password = document.getElementById('a-password').value;

      if (!name || !email || !phone || !specialization || !password) {
        err.textContent = 'All fields are required.';
        return;
      }

      const params = new URLSearchParams({
        hospital_id: selectedHospitalId,
        name, email, phone, specialization, password
      });

      try {
        await api('POST', `/admin/create-admin-jwt?${params.toString()}`);
        toast('Admin account created successfully.', 'success');
        closeAdminModal();
      } catch(e) {
        err.textContent = e.message;
      }
    }
  </script>
</body>
</html>
