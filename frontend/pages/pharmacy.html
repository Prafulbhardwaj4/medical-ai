<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pharmacy — MedScribe</title>
  <link rel="stylesheet" href="../css/style.css?v=4" />
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="topbar-brand">Med<span>Scribe</span></div>
      </div>
      <div class="topbar-doctor">
        <span><strong id="topbar-doctor-name"></strong></span>
        <div class="topbar-divider"></div>
        <span id="topbar-clinic" style="color:var(--slate)"></span>
        <button class="btn-logout" onclick="logout()">Sign out</button>
      </div>
      <button class="notif-bell-btn" id="notif-bell-btn" onclick="toggleNotifPanel()" style="display:none">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <span class="notif-badge" id="notif-badge">0</span>
      </button>
      <button class="topbar-profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 4-6 8-6s8 2 8 6" />
        </svg>
      </button>
    </header>

    <div class="sidebar-backdrop" id="profile-menu-backdrop" onclick="closeProfileMenu()" style="display:none"></div>
    <div class="profile-menu" id="profile-menu">
      <div class="profile-menu-header">
        <strong id="profile-menu-name"></strong>
        <span id="profile-menu-clinic"></span>
      </div>
      <button class="profile-menu-item" onclick="closeProfileMenu();toast('Settings — Coming Soon','info')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        Settings
      </button>
      <button class="profile-menu-item danger" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Sign out
      </button>
    </div>
    <div class="notif-backdrop" id="notif-backdrop" onclick="closeNotifPanel()"></div>
    <div class="notif-panel" id="notif-panel">
      <div class="notif-panel-header">
        <h3 style="margin:0;font-size:15px">Notifications</h3>
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn btn-outline btn-sm" onclick="markAllNotifsRead()">Mark all read</button>
          <button class="modal-close" onclick="closeNotifPanel()">×</button>
        </div>
      </div>
      <div class="notif-panel-body" id="notif-panel-body">
        <p style="color:var(--slate-light);padding:20px;text-align:center;font-size:13px">Loading…</p>
      </div>
    </div>

    <nav class="sidebar">
      <div class="sidebar-section-label">Navigation</div>
      <div class="nav-item" id="nav-queue-tab" onclick="switchPharmacyTab('queue')" style="cursor:pointer">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
        </svg>
        Pharmacy Queue
      </div>
      <div class="nav-item" id="nav-stock-tab" onclick="switchPharmacyTab('stock')" style="cursor:pointer">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
        </svg>
        Medicine Stock
      </div>
    </nav>

    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <nav class="bottom-nav">
      <button class="bottom-nav-item active" id="tab-btn-queue" onclick="switchPharmacyTab('queue')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
        </svg>
        Queue
      </button>
      <button class="bottom-nav-item" id="tab-btn-stock" onclick="switchPharmacyTab('stock')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
        </svg>
        Stock
      </button>
      <button class="bottom-nav-item" id="tab-btn-attendance" onclick="switchPharmacyTab('attendance')">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        Attendance
      </button>
    </nav>

    <main class="main-content">
      <div class="mobile-section" id="section-attendance">
        <div class="card">
          <div class="card-header" style="margin-bottom:0">
            <h2>Today's Status</h2>
          </div>
          <div class="staff-att-status">
            <span class="badge badge-grey" id="pharm-attendance-badge">Not marked</span>
          </div>
          <div class="staff-att-actions">
            <button class="btn btn-primary" id="pharm-btn-present" onclick="markPharmAttendance('present')">Mark
              Present</button>
            <button class="btn btn-outline" id="pharm-btn-break" onclick="markPharmAttendance('on_break')"
              style="display:none">On Break</button>
            <button class="btn btn-outline" id="pharm-btn-offduty" onclick="markPharmAttendance('off_duty')"
              style="display:none;color:var(--danger);border-color:var(--danger)">Off Duty</button>
          </div>
        </div>
      </div>

      <div id="pharmacy-queue-view" class="mobile-section active">
        <div class="card">
          <div class="card-header"
            style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
            <h2 style="margin:0">Pharmacy Queue</h2>
            <button class="btn btn-outline btn-sm" onclick="loadQueue()">Refresh</button>
          </div>

          <div style="display:grid;grid-template-columns:1fr 200px;gap:10px;margin:16px 0 14px">
            <input class="form-control" id="pharm-search" placeholder="Search by token or patient name…"
              oninput="renderQueue()" />
            <select class="form-control" id="pharm-filter" onchange="renderQueue()">
              <option value="all">All</option>
              <option value="pending">Pending</option>
              <option value="dispensed">Dispensed</option>
            </select>
          </div>

          <input class="form-control" id="pharm-pending-search" placeholder="Find patient (pending medicine tasks)…"
            style="margin-bottom:10px" oninput="searchPharmPendingTasks(this.value)" />
          <div id="pharm-pending-results" style="margin-bottom:10px"></div>

          <input class="form-control" id="pharm-doc-search" placeholder="Find patient (documents / generate bill)…"
            style="margin-bottom:10px" oninput="searchPharmDocPatients(this.value)" />
          <div id="pharm-doc-results" style="margin-bottom:10px"></div>

          <div id="pharmacy-queue-list">
            <p style="color:var(--slate)">Loading…</p>
          </div>
        </div>
      </div>

      <div id="pharmacy-stock-view" style="display:none">
        <div id="stock-low-stock-panel"
          style="display:none;margin-bottom:14px;border:1px solid #fde68a;background:#fffbeb;border-radius:var(--radius);padding:14px 16px">
          <div style="font-weight:700;color:#92400e;font-size:14px;margin-bottom:8px">📉 Low Stock</div>
          <div id="stock-low-stock-list"></div>
        </div>
        <div id="stock-expiring-panel"
          style="display:none;margin-bottom:20px;border:1px solid #fecaca;background:#fef2f2;border-radius:var(--radius);padding:14px 16px">
          <div style="font-weight:700;color:#991b1b;font-size:14px;margin-bottom:8px">⚠ Expiring Soon / Expired</div>
          <div id="stock-expiring-list"></div>
        </div>

        <div class="card">
          <div class="card-header"
            style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
            <h2 style="margin:0">Medicine Stock</h2>
            <button class="btn btn-outline btn-sm" onclick="loadStockMedicines()">Refresh</button>
          </div>
          <input class="form-control" id="stock-search" placeholder="Search medicines…" oninput="renderStockMedicines()"
            style="margin:16px 0" />
          <div id="stock-medicines-list">
            <p style="color:var(--slate)">Loading…</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Stock Modal -->
  <div class="modal-overlay" id="modal-add-stock">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Stock — <span id="stock-medicine-name"></span></h2>
        <button class="modal-close" onclick="closeAddStockModal()">×</button>
      </div>
      <label style="display:block;margin-bottom:6px;font-size:14px;color:var(--slate)">Quantity Received</label>
      <input class="form-control" id="stock-qty" type="number" min="1" step="1" placeholder="e.g. 100"
        style="margin-bottom:14px" />
      <label style="display:block;margin-bottom:6px;font-size:14px;color:var(--slate)">Expiry Date</label>
      <input class="form-control" id="stock-expiry" type="date" style="margin-bottom:14px" />
      <label style="display:block;margin-bottom:6px;font-size:14px;color:var(--slate)">Batch / Lot Number
        (optional)</label>
      <input class="form-control" id="stock-batch-number" placeholder="e.g. B4521" style="margin-bottom:14px" />
      <div class="err-msg" id="stock-modal-err" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:12px">
        <button class="btn btn-primary" style="flex:1" onclick="submitAddStock()">Add Stock</button>
        <button class="btn btn-outline" style="flex:1" onclick="closeAddStockModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Batches Modal -->
  <div class="modal-overlay" id="modal-batches">
    <div class="modal">
      <div class="modal-header">
        <h2>Stock Batches — <span id="batches-medicine-name"></span></h2>
        <button class="modal-close" onclick="closeBatchesModal()">×</button>
      </div>
      <div id="batches-list" style="max-height:50vh;overflow-y:auto"></div>
    </div>
  </div>

  <!-- Documents / Bills Modal -->
  <div class="modal-overlay" id="modal-documents">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h2>Documents — <span id="doc-patient-name"></span></h2>
        <button class="modal-close" onclick="closeDocumentsModal()">×</button>
      </div>
      <div id="documents-list" style="max-height:60vh;overflow-y:auto"></div>
    </div>
  </div>

  <!-- Prescription Detail Modal -->
  <div class="modal-overlay" id="modal-prescription">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h2>Prescription — <span id="rx-token"></span></h2>
        <button class="modal-close" onclick="closePrescriptionModal()">×</button>
      </div>
      <p style="font-size:14px;color:var(--slate);margin-bottom:4px"><strong>Patient:</strong> <span
          id="rx-patient"></span></p>
      <p style="font-size:14px;color:var(--slate);margin-bottom:14px"><strong>Doctor:</strong> <span
          id="rx-doctor"></span></p>
      <div id="rx-medicines" style="margin-bottom:16px"></div>
      <div class="err-msg" id="rx-modal-err" style="margin-bottom:12px"></div>
      <button class="btn btn-primary" id="rx-pay-btn" style="width:100%;margin-bottom:8px"
        onclick="collectMedicinePayment()">Collect Payment</button>
      <button class="btn btn-primary" id="rx-dispense-btn" style="width:100%;margin-bottom:8px"
        onclick="markRxDispensed()">Mark Dispensed</button>
      <button class="btn btn-outline" id="rx-bill-btn" style="width:100%" onclick="generateBillFromPharmacy()">Generate
        Bill</button>
    </div>
  </div>

  <!-- Link to Catalog Modal -->
  <div class="modal-overlay" id="modal-link-catalog">
    <div class="modal">
      <div class="modal-header">
        <h2>Link to Catalog Medicine</h2>
        <button class="modal-close" onclick="closeLinkCatalogModal()">×</button>
      </div>
      <input class="form-control" id="link-search" placeholder="Search catalog…" oninput="searchLinkCatalog()"
        style="margin-bottom:12px" />
      <div id="link-results"></div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="../js/api.js?v=4"></script>
  <script>
    if (!requireAuth()) throw new Error("Not authenticated");
    if (getDoctor()?.role !== 'pharmacy') window.location.href = 'login.html';
    fillTopbar();

    if (["admin", "sub_admin", "pharmacy"].includes(getDoctor()?.role)) {
      document.getElementById('notif-bell-btn').style.display = '';
      loadNotifUnreadCount();
      setInterval(loadNotifUnreadCount, 30000);
    }

    async function loadNotifUnreadCount() {
      try {
        const data = await api("GET", "/notifications/unread-count");
        const badge = document.getElementById('notif-badge');
        if (data.unread_count > 0) {
          badge.textContent = data.unread_count > 99 ? '99+' : data.unread_count;
          badge.style.display = 'flex';
        } else {
          badge.style.display = 'none';
        }
      } catch (e) { }
    }

    async function toggleNotifPanel() {
      const panel = document.getElementById('notif-panel');
      const backdrop = document.getElementById('notif-backdrop');
      if (panel.classList.contains('open')) {
        closeNotifPanel();
      } else {
        panel.classList.add('open');
        backdrop.classList.add('open');
        await loadNotifList();
      }
    }

    function closeNotifPanel() {
      document.getElementById('notif-panel').classList.remove('open');
      document.getElementById('notif-backdrop').classList.remove('open');
    }

    const NOTIF_ICON = { critical: 'critical', warning: 'warning', info: 'info' };

    async function loadNotifList() {
      const body = document.getElementById('notif-panel-body');
      try {
        const data = await api("GET", "/notifications");
        loadNotifUnreadCount();
        if (!data.notifications.length) {
          body.innerHTML = '<p style="color:var(--slate-light);padding:20px;text-align:center;font-size:13px">You\'re all caught up.</p>';
          return;
        }
        body.innerHTML = data.notifications.map(n => `
          <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="onNotifClick(${n.id}, '${n.link_type || ''}', ${n.link_id || 'null'})">
            <div class="notif-item-title">
              <span class="notif-dot ${NOTIF_ICON[n.severity] || 'info'}"></span>
              ${sanitize(n.title)}
            </div>
            <div class="notif-item-message">${sanitize(n.message)}</div>
          </div>
        `).join('');
      } catch (e) {
        body.innerHTML = '<p style="color:var(--danger);padding:20px;text-align:center;font-size:13px">Could not load notifications.</p>';
      }
    }

    async function onNotifClick(id, linkType, linkId) {
      try {
        await api("PATCH", `/notifications/${id}/read`, {});
        loadNotifUnreadCount();
        if (linkType === 'medicine') {
          window.location.href = 'medicines.html';
        }
      } catch (e) { }
    }

    async function markAllNotifsRead() {
      try {
        await api("POST", "/notifications/mark-all-read", {});
        loadNotifList();
      } catch (e) { }
    }

    let pharmCurrentStatus = 'not_marked';
    let queueData = [];
    let currentRxToken = null;
    let currentRxHash = null;

    async function loadPharmAttendance() {
      try {
        const data = await api("GET", "/doctors/attendance/my-status");
        renderPharmBadge(data.status);
      } catch (e) { }
    }

    function renderPharmBadge(status) {
      pharmCurrentStatus = status;
      const badge = document.getElementById('pharm-attendance-badge');
      const btnPresent = document.getElementById('pharm-btn-present');
      const btnBreak = document.getElementById('pharm-btn-break');
      const btnOffDuty = document.getElementById('pharm-btn-offduty');
      if (status === 'present') {
        badge.className = 'badge badge-green'; badge.textContent = 'Present';
        btnPresent.style.display = 'none'; btnBreak.style.display = ''; btnOffDuty.style.display = '';
      } else if (status === 'on_break') {
        badge.className = 'badge badge-amber'; badge.textContent = 'On Break';
        btnPresent.textContent = 'Resume'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = '';
      } else if (status === 'off_duty') {
        badge.className = 'badge badge-red'; badge.textContent = 'Off Duty';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      } else {
        badge.className = 'badge badge-grey'; badge.textContent = 'Not marked';
        btnPresent.textContent = 'Mark Present'; btnPresent.style.display = ''; btnBreak.style.display = 'none'; btnOffDuty.style.display = 'none';
      }
    }

    function isPharmPresent() {
      const badge = document.getElementById('pharm-attendance-badge');
      return badge && (badge.textContent === 'Present' || badge.textContent === 'On Break');
    }

    async function markPharmAttendance(status) {
      try {
        const wasAlreadyPresent = pharmCurrentStatus === status;
        await api("POST", "/doctors/attendance", { status, room_id: null });
        renderPharmBadge(status);
        if (!wasAlreadyPresent) {
          const labels = { present: "Marked present.", on_break: "On break.", off_duty: "Marked off duty." };
          toast(labels[status] || "Status updated.", "success");
        }
      } catch (e) { toast(e.message, "error"); }
    }

    async function loadQueue() {
      try {
        queueData = await api("GET", "/pharmacy/queue");
        renderQueue();
      } catch (e) { toast(e.message, "error"); }
    }

    function timeSince(iso) {
      const utc = iso.endsWith("Z") ? iso : iso + "Z";
      const mins = Math.floor((Date.now() - new Date(utc).getTime()) / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins} min ago`;
      const hrs = Math.floor(mins / 60);
      return `${hrs} hr ${mins % 60}m ago`;
    }

    function renderQueue() {
      const el = document.getElementById('pharmacy-queue-list');
      const search = document.getElementById('pharm-search').value.trim().toLowerCase();
      const filter = document.getElementById('pharm-filter').value;

      let items = queueData;
      if (filter === 'pending') items = items.filter(i => !i.is_dispensed);
      if (filter === 'dispensed') items = items.filter(i => i.is_dispensed);
      if (search) {
        items = items.filter(i =>
          i.token_number.toLowerCase().includes(search) ||
          i.patient_name.toLowerCase().includes(search)
        );
      }

      if (!items.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:12px 0">No prescriptions found.</p>';
        return;
      }

      el.innerHTML = items.map(i => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;cursor:pointer"
          onclick="openPrescription('${i.token_number}')">
          <div style="flex:1;min-width:200px">
            <span class="badge badge-navy">${i.token_number}</span>
            <strong style="margin-left:8px">${sanitize(i.patient_name)}</strong>
          </div>
          <div style="font-size:12px;color:var(--slate);min-width:120px">${timeSince(i.confirmed_at)}</div>
          <div>${i.is_dispensed
          ? '<span class="badge badge-green">Dispensed</span>'
          : '<span class="badge badge-amber">Pending</span>'}</div>
        </div>
      `).join('');
    }

    let currentMedicineOrders = [];
    let linkingOrderId = null;
    let addMedicineMode = false;
    let addMedicineSubstituteFor = null;

    let pharmPendingSearchTimer;
    function searchPharmPendingTasks(val) {
      clearTimeout(pharmPendingSearchTimer);
      pharmPendingSearchTimer = setTimeout(() => runPharmPendingSearch(val), 350);
    }

    async function runPharmPendingSearch(q) {
      const el = document.getElementById('pharm-pending-results');
      if (!q || q.trim().length < 2) { el.innerHTML = ''; return; }
      try {
        const results = await api("GET", `/pharmacy/pending-tasks?q=${encodeURIComponent(q)}`);
        renderPharmPendingResults(results);
      } catch (e) { }
    }

    function renderPharmPendingResults(results) {
      const el = document.getElementById('pharm-pending-results');
      if (!results.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:8px 0">No pending tasks found for this search.</p>';
        return;
      }
      el.innerHTML = results.map(r => `
        <div style="border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px">
          <strong>${sanitize(r.patient_name)}</strong> <span class="badge badge-navy">${sanitize(r.patient_uid)}</span>
          ${r.pending.map(p => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;flex-wrap:wrap;gap:8px">
              <div style="font-size:13px">
                ${sanitize(p.medicine_name)} × ${p.quantity ?? '—'}
                <div style="color:var(--slate);font-size:12px">Prescribed by ${sanitize(p.doctor_name)} · token ${sanitize(p.token_number || '—')} · paid ${p.paid_at ? new Date(p.paid_at + 'Z').toLocaleDateString('en-IN') : '—'}</div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="requeueMedicineOrder(${p.order_id})">Requeue to Today</button>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    async function requeueMedicineOrder(orderId) {
      try {
        await api("POST", `/pharmacy/medicine-orders/${orderId}/requeue`, {});
        toast('Requeued to today\'s list.', 'success');
        document.getElementById('pharm-pending-search').value = '';
        document.getElementById('pharm-pending-results').innerHTML = '';
        loadQueue();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function openPrescription(tokenNumber) {
      if (!isPharmPresent()) { toast('Mark yourself Present first.', 'info'); return; }
      try {
        const rx = await api("GET", `/pharmacy/prescription/${tokenNumber}`);
        currentRxToken = rx.token_number;
        currentRxHash = rx.verify_hash;
        currentMedicineOrders = rx.medicine_orders || [];

        document.getElementById('rx-token').textContent = rx.token_number;
        document.getElementById('rx-patient').textContent = `${rx.patient_name} · ${rx.patient_age}yr · ${rx.patient_gender}`;
        document.getElementById('rx-doctor').textContent = rx.doctor_name;

        renderMedicineOrders();
        document.getElementById('rx-modal-err').textContent = '';
        updateRxActionButtons(rx.is_dispensed);

        document.getElementById('modal-prescription').classList.add('open');
      } catch (e) { toast(e.message, "error"); }
    }

    function renderMedicineOrders() {
      const el = document.getElementById('rx-medicines');
      if (!currentMedicineOrders.length) {
        el.innerHTML = '<p style="color:var(--slate-light)">No medicines listed.</p><button class="btn btn-outline btn-sm" onclick="openAddMedicineModal()">+ Add Medicine</button>';
        return;
      }
      el.innerHTML = currentMedicineOrders.map(m => {
        const locked = m.status !== 'advised';
        const lowStock = m.stock_quantity != null && m.low_stock_threshold != null && m.stock_quantity < m.low_stock_threshold;
        const billedNote = (m.billed_quantity != null && m.quantity != null && m.billed_quantity < m.quantity)
          ? `<div style="color:var(--danger);font-size:12px;margin-top:4px">Only ${m.billed_quantity} of ${m.quantity} charged — rest out of stock</div>` : '';
        return `
        <div style="padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;${m.included ? '' : 'opacity:0.45'}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:${locked ? 'default' : 'pointer'};flex:1">
              <input type="checkbox" ${m.included ? 'checked' : ''} ${locked ? 'disabled' : ''}
                onchange="toggleMedicineInclude(${m.id})" style="width:16px;height:16px;margin-top:2px" />
              <span>
                <strong>${sanitize(m.medicine_name)}</strong>${m.brand_name ? ` (${sanitize(m.brand_name)})` : ''}
                <div style="color:var(--slate);font-size:12px">${sanitize(m.dosage || '')} — ${sanitize(m.frequency || '')}${m.duration ? ' × ' + sanitize(m.duration) : ''}</div>
                ${lowStock ? `<div style="color:var(--danger);font-size:12px;margin-top:2px">Stock: ${m.stock_quantity} left</div>` : ''}
                ${billedNote}
              </span>
            </label>
            <span class="badge ${m.status === 'dispensed' ? 'badge-green' : m.status === 'paid' ? 'badge-navy' : m.status === 'unavailable' ? 'badge-grey' : 'badge-amber'}" style="flex-shrink:0">${m.status === 'unavailable' ? 'advised outside' : m.status}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;padding-left:24px">
            ${m.catalog_medicine_id
            ? `<span style="font-size:13px;color:var(--slate)">Rs.${m.unit_price}/unit</span>`
            : `<button class="btn btn-outline btn-sm" ${locked ? 'disabled' : ''} onclick="openLinkCatalogModal(${m.id})">Link to Catalog for Price</button>`}
            <label style="font-size:13px;color:var(--slate);display:flex;align-items:center;gap:6px">
              Qty:
              <input type="number" min="1" style="width:64px;padding:4px 6px;border:1px solid var(--border);border-radius:6px"
                value="${m.quantity != null ? m.quantity : ''}" ${locked ? 'disabled' : ''}
                onchange="updateMedicineQuantity(${m.id}, this.value)" />
            </label>
            ${m.line_total != null ? `<span style="font-size:13px;font-weight:600">= Rs.${m.line_total}</span>` : ''}
            ${!locked ? `<button class="btn btn-outline btn-sm" onclick="openAddMedicineModal(${m.id})">Add Substitute</button>` : ''}
            ${!locked ? `<button class="btn btn-outline btn-sm" onclick="markMedicineUnavailable(${m.id})">Advise Outside</button>` : ''}
          </div>
        </div>
      `}).join('') + '<button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="openAddMedicineModal()">+ Add Medicine</button>';
    }

    async function markMedicineUnavailable(orderId) {
      if (!confirm('Mark this medicine as advised outside (not billed here)?')) return;
      try {
        const updated = await api("PATCH", `/pharmacy/medicine-orders/${orderId}/mark-unavailable`, {});
        const idx = currentMedicineOrders.findIndex(m => m.id === orderId);
        if (idx > -1) currentMedicineOrders[idx] = updated;
        renderMedicineOrders();
        toast('Marked as advised outside.', 'info');
      } catch (e) { toast(e.message, 'error'); }
    }

    async function toggleMedicineInclude(orderId) {
      try {
        await api("PATCH", `/pharmacy/medicine-orders/${orderId}/toggle-include`, {});
        const order = currentMedicineOrders.find(m => m.id === orderId);
        if (order) order.included = !order.included;
        renderMedicineOrders();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function updateMedicineQuantity(orderId, value) {
      const qty = parseInt(value);
      if (!qty || qty <= 0) { toast('Enter a valid quantity.', 'error'); return; }
      try {
        const updated = await api("PATCH", `/pharmacy/medicine-orders/${orderId}/quantity`, { quantity: qty });
        const idx = currentMedicineOrders.findIndex(m => m.id === orderId);
        if (idx > -1) currentMedicineOrders[idx] = updated;
        renderMedicineOrders();
      } catch (e) { toast(e.message, 'error'); }
    }

    function openLinkCatalogModal(orderId) {
      linkingOrderId = orderId;
      addMedicineMode = false;
      addMedicineSubstituteFor = null;
      document.getElementById('link-search').value = '';
      document.getElementById('link-results').innerHTML = '';
      document.querySelector('#modal-link-catalog h2').textContent = 'Link to Catalog Medicine';
      document.getElementById('modal-link-catalog').classList.add('open');
    }

    function openAddMedicineModal(substituteForId) {
      addMedicineMode = true;
      addMedicineSubstituteFor = substituteForId || null;
      linkingOrderId = null;
      document.getElementById('link-search').value = '';
      document.getElementById('link-results').innerHTML = '';
      document.querySelector('#modal-link-catalog h2').textContent = substituteForId ? 'Add Substitute Medicine' : 'Add Medicine';
      document.getElementById('modal-link-catalog').classList.add('open');
    }

    function closeLinkCatalogModal() {
      document.getElementById('modal-link-catalog').classList.remove('open');
      linkingOrderId = null;
      addMedicineMode = false;
      addMedicineSubstituteFor = null;
    }

    let linkSearchTimeout = null;
    async function searchLinkCatalog() {
      clearTimeout(linkSearchTimeout);
      linkSearchTimeout = setTimeout(async () => {
        const q = document.getElementById('link-search').value.trim();
        try {
          const results = await api("GET", `/pharmacy/medicines/search?q=${encodeURIComponent(q)}`);
          document.getElementById('link-results').innerHTML = results.length
            ? results.map(r => `
                <div style="padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer"
                  onclick="handleCatalogPick(${r.id})">
                  <span>${sanitize(r.generic_name)}${r.strength ? ' ' + sanitize(r.strength) : ''} ${r.brand_names ? `<span style="color:var(--slate);font-size:12px">(${sanitize(r.brand_names)})</span>` : ''}</span>
                  <span style="font-size:13px;color:var(--slate)">${r.price != null ? 'Rs.' + r.price : 'no price'}</span>
                </div>
              `).join('')
            : '<p style="color:var(--slate-light);font-size:13px">No matches.</p>';
        } catch (e) { }
      }, 250);
    }

    function handleCatalogPick(catalogId) {
      if (addMedicineMode) {
        addMedicineFromCatalog(catalogId);
      } else {
        linkCatalogMedicine(catalogId);
      }
    }

    async function linkCatalogMedicine(catalogId) {
      try {
        const updated = await api("PATCH", `/pharmacy/medicine-orders/${linkingOrderId}/link-catalog`, { catalog_medicine_id: catalogId });
        const idx = currentMedicineOrders.findIndex(m => m.id === linkingOrderId);
        if (idx > -1) currentMedicineOrders[idx] = updated;
        renderMedicineOrders();
        closeLinkCatalogModal();
        toast('Linked to catalog.', 'success');
      } catch (e) { toast(e.message, 'error'); }
    }

    async function addMedicineFromCatalog(catalogId) {
      const qtyStr = prompt('Quantity:', '1');
      if (qtyStr === null) return;
      const qty = parseInt(qtyStr);
      if (!qty || qty <= 0) { toast('Enter a valid quantity.', 'error'); return; }
      try {
        const newOrder = await api("POST", `/pharmacy/prescription/${currentRxToken}/add-medicine`, {
          catalog_medicine_id: catalogId,
          quantity: qty,
          substitute_for_id: addMedicineSubstituteFor
        });
        currentMedicineOrders.push(newOrder);
        renderMedicineOrders();
        closeLinkCatalogModal();
        toast('Medicine added.', 'success');
      } catch (e) { toast(e.message, 'error'); }
    }

    function updateRxActionButtons(isDispensed) {
      const payBtn = document.getElementById('rx-pay-btn');
      const dispenseBtn = document.getElementById('rx-dispense-btn');

      if (isDispensed) {
        payBtn.style.display = 'none';
        dispenseBtn.disabled = true;
        dispenseBtn.style.display = '';
        dispenseBtn.textContent = 'Already Dispensed';
        return;
      }

      const hasUnpaidIncluded = currentMedicineOrders.some(m => m.included && m.status === 'advised');
      if (hasUnpaidIncluded) {
        payBtn.style.display = '';
        dispenseBtn.style.display = 'none';
      } else {
        payBtn.style.display = 'none';
        dispenseBtn.style.display = '';
        dispenseBtn.disabled = false;
        dispenseBtn.textContent = 'Mark Dispensed';
      }
    }

    let pharmDocSearchTimer = null;
    async function searchPharmDocPatients(q) {
      clearTimeout(pharmDocSearchTimer);
      const box = document.getElementById('pharm-doc-results');
      if (!q || q.trim().length < 2) { box.innerHTML = ''; return; }
      pharmDocSearchTimer = setTimeout(async () => {
        try {
          const patients = await api("GET", `/patients/?search=${encodeURIComponent(q.trim())}&limit=8`);
          if (!patients.length) { box.innerHTML = '<p style="color:var(--slate-light);font-size:13px">No matches.</p>'; return; }
          box.innerHTML = patients.map(p => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px">
              <span style="font-size:14px">${sanitize(p.name)} <span style="color:var(--slate);font-size:12px">· ${sanitize(p.patient_uid)}</span></span>
              <button class="btn btn-outline btn-sm" onclick="openDocumentsModal(${p.id}, '${p.name.replace(/'/g, "\\'")}')">📄 Docs</button>
            </div>
          `).join('');
        } catch (e) { box.innerHTML = `<p style="color:var(--danger);font-size:13px">${e.message}</p>`; }
      }, 300);
    }

    const DOC_TYPE_LABEL = {
      token_slip: "🎫 Token Slip",
      prescription: "📋 Prescription",
      test_report: "🧪 Test Report",
      invoice: "🧾 Invoice"
    };

    async function openDocumentsModal(patientId, patientName) {
      window._docModalPatientId = patientId;
      document.getElementById('doc-patient-name').textContent = patientName;
      document.getElementById('documents-list').innerHTML = '<p style="color:var(--slate)">Loading…</p>';
      document.getElementById('modal-documents').classList.add('open');
      try {
        const docs = await api("GET", `/patients/${patientId}/documents`);
        renderDocuments(docs);
      } catch (e) {
        document.getElementById('documents-list').innerHTML = `<p style="color:var(--danger)">${e.message}</p>`;
      }
    }

    function closeDocumentsModal() {
      document.getElementById('modal-documents').classList.remove('open');
    }

    function renderDocuments(docs) {
      const el = document.getElementById('documents-list');
      if (!docs.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:12px 0">No documents yet for this patient.</p>';
        return;
      }
      el.innerHTML = docs.map(d => {
        const dt = new Date(d.date && d.date.endsWith("Z") ? d.date : d.date + "Z");
        const dateStr = dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        const timeStr = dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        const billAction = (d.type === 'token_slip' && !d.has_invoice)
          ? `<button class="btn btn-primary btn-sm" onclick="generateBillForCheckin(${d.checkin_id}, this)">🧾 Generate Bill</button>`
          : '';
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap">
            <div>
              <strong>${DOC_TYPE_LABEL[d.type] || d.label}</strong>
              <div style="font-size:12px;color:var(--slate)">${dateStr} · ${timeStr}</div>
            </div>
            <div style="display:flex;gap:8px">
              ${billAction}
              <button class="btn btn-outline btn-sm" onclick="viewDocument('${d.type}', ${d.ref_id})">View / Print</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function generateBillForCheckin(checkinId, btnEl) {
      btnEl.disabled = true;
      btnEl.textContent = 'Generating…';
      try {
        const invoice = await api("POST", `/billing/checkins/${checkinId}/finalize-invoice`, {});
        toast(`Bill generated — Rs.${invoice.grand_total}`, 'success');
        const currentPatientId = window._docModalPatientId;
        if (currentPatientId) {
          const docs = await api("GET", `/patients/${currentPatientId}/documents`);
          renderDocuments(docs);
        }
      } catch (e) {
        toast(e.message, 'error');
        btnEl.disabled = false;
        btnEl.textContent = '🧾 Generate Bill';
      }
    }

    async function viewDocument(type, refId) {
      try {
        let url = null;
        if (type === 'prescription') url = `${BASE}/patients/prescriptions/${refId}/download`;
        else if (type === 'test_report') url = `${BASE}/lab/orders/${refId}/report`;
        else if (type === 'invoice') url = `${BASE}/billing/invoices/${refId}/pdf`;
        else if (type === 'token_slip') { toast('Reopen this token from reception to reprint the slip.', 'info'); return; }

        const response = await fetch(url, { headers: { "Authorization": `Bearer ${getToken()}` } });
        if (!response.ok) throw new Error("Could not load document");
        const blob = await response.blob();
        window.open(URL.createObjectURL(blob), "_blank");
      } catch (e) { toast(e.message, 'error'); }
    }

    async function generateBillFromPharmacy() {
      try {
        const checkinLookup = await api("GET", `/patients/checkin-by-token/${currentRxToken}`);
        const invoice = await api("POST", `/billing/checkins/${checkinLookup.checkin_id}/finalize-invoice`, {});
        toast(`Bill generated — Rs.${invoice.grand_total}`, 'success');
        const response = await fetch(`${BASE}/billing/invoices/${invoice.id}/pdf`, {
          headers: { "Authorization": `Bearer ${getToken()}` }
        });
        const blob = await response.blob();
        window.open(URL.createObjectURL(blob), "_blank");
      } catch (e) {
        document.getElementById('rx-modal-err').textContent = e.message;
      }
    }

    async function collectMedicinePayment() {
      try {
        const result = await api("POST", `/pharmacy/prescription/${currentRxToken}/collect-payment`, {});
        if (result.skipped && result.skipped.length) {
          toast(`Rs.${result.charged} collected for ${result.count} medicine(s). Out of stock, not charged: ${result.skipped.join(', ')}`, 'info');
        } else {
          toast(`Rs.${result.charged} collected for ${result.count} medicine(s).`, 'success');
        }
        openPrescription(currentRxToken);
      } catch (e) {
        document.getElementById('rx-modal-err').textContent = e.message;
      }
    }

    function closePrescriptionModal() {
      document.getElementById('modal-prescription').classList.remove('open');
      currentRxToken = null;
      currentRxHash = null;
    }

    async function markRxDispensed() {
      if (!currentRxToken || !currentRxHash) return;
      const btn = document.getElementById('rx-dispense-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        await api("POST", `/consultations/verify/${currentRxToken}/dispense?hash=${encodeURIComponent(currentRxHash)}`, {});
        toast('Marked as dispensed.', 'success');
        closePrescriptionModal();
        loadQueue();
      } catch (e) {
        document.getElementById('rx-modal-err').textContent = e.message;
        btn.disabled = false;
        btn.textContent = 'Mark Dispensed';
      }
    }

    function sanitize(s) {
      const div = document.createElement('div');
      div.textContent = String(s ?? '');
      return div.innerHTML;
    }

    function switchPharmacyTab(tab) {
      document.getElementById('pharmacy-queue-view').style.display = tab === 'queue' ? 'block' : 'none';
      document.getElementById('pharmacy-stock-view').style.display = tab === 'stock' ? 'block' : 'none';
      document.getElementById('section-attendance').style.display = tab === 'attendance' ? 'block' : 'none';
      document.getElementById('nav-queue-tab').classList.toggle('active', tab === 'queue');
      document.getElementById('nav-stock-tab').classList.toggle('active', tab === 'stock');
      document.getElementById('tab-btn-queue').classList.toggle('active', tab === 'queue');
      document.getElementById('tab-btn-stock').classList.toggle('active', tab === 'stock');
      document.getElementById('tab-btn-attendance').classList.toggle('active', tab === 'attendance');
      if (tab === 'stock') loadStockMedicines();
    }

    let stockMedicinesData = [];
    let currentStockMedicineId = null;

    async function loadStockMedicines() {
      try {
        const [items, expiring, lowStock] = await Promise.all([
          api("GET", "/admin/medicines"),
          api("GET", "/admin/medicines/expiring?within_days=30").catch(() => []),
          api("GET", "/admin/medicines/low-stock").catch(() => [])
        ]);
        stockMedicinesData = items;
        renderStockAlerts(expiring, lowStock);
        renderStockMedicines();
      } catch (e) { toast(e.message, "error"); }
    }

    function renderStockAlerts(expiring, lowStock) {
      const lowPanel = document.getElementById('stock-low-stock-panel');
      const lowList = document.getElementById('stock-low-stock-list');
      if (lowStock.length) {
        lowPanel.style.display = 'block';
        lowList.innerHTML = lowStock.map(i => `
          <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px">
            <span>${sanitize(i.medicine_name)}</span>
            <span style="font-weight:600;color:${i.is_out_of_stock ? '#991b1b' : '#92400e'}">${i.is_out_of_stock ? 'Out of stock' : i.stock_quantity + ' left'}</span>
          </div>
        `).join('');
      } else { lowPanel.style.display = 'none'; }

      const expPanel = document.getElementById('stock-expiring-panel');
      const expList = document.getElementById('stock-expiring-list');
      if (expiring.length) {
        expPanel.style.display = 'block';
        expList.innerHTML = expiring.map(i => `
          <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px">
            <span>${sanitize(i.medicine_name)}${i.batch_number ? ' · Lot ' + sanitize(i.batch_number) : ''} — ${i.quantity} units</span>
            <span style="font-weight:600;color:${i.is_expired ? '#991b1b' : '#b45309'}">${i.is_expired ? 'Expired' : i.days_left + 'd left'}</span>
          </div>
        `).join('');
      } else { expPanel.style.display = 'none'; }
    }

    function renderStockMedicines() {
      const el = document.getElementById('stock-medicines-list');
      const search = document.getElementById('stock-search').value.trim().toLowerCase();
      let items = stockMedicinesData;
      if (search) {
        items = items.filter(m => m.generic_name.toLowerCase().includes(search) || (m.brand_names || '').toLowerCase().includes(search));
      }
      if (!items.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:12px 0">No medicines found.</p>';
        return;
      }
      el.innerHTML = items.map(m => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap">
          <div style="flex:1;min-width:200px">
            <strong>${sanitize(m.generic_name)}${m.strength ? ' ' + sanitize(m.strength) : ''}</strong>
            <div style="font-size:12px;color:var(--slate)">${sanitize(m.category || '—')} · ${sanitize(m.dosage_forms || '—')}</div>
          </div>
          <div style="font-size:13px;min-width:80px">Stock: <strong>${m.stock_quantity != null ? m.stock_quantity : '—'}</strong></div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline btn-sm" onclick="openBatchesModal(${m.id}, '${sanitize(m.generic_name).replace(/'/g, "\\'")}')">View Batches</button>
            <button class="btn btn-primary btn-sm" onclick="openAddStockModal(${m.id}, '${sanitize(m.generic_name).replace(/'/g, "\\'")}')">+ Add Stock</button>
          </div>
        </div>
      `).join('');
    }

    function openAddStockModal(medicineId, medicineName) {
      currentStockMedicineId = medicineId;
      document.getElementById('stock-medicine-name').textContent = medicineName;
      document.getElementById('stock-qty').value = '';
      document.getElementById('stock-expiry').value = '';
      document.getElementById('stock-batch-number').value = '';
      document.getElementById('stock-modal-err').textContent = '';
      document.getElementById('modal-add-stock').classList.add('open');
    }

    function closeAddStockModal() {
      document.getElementById('modal-add-stock').classList.remove('open');
      currentStockMedicineId = null;
    }

    async function submitAddStock() {
      const errEl = document.getElementById('stock-modal-err');
      const qty = parseInt(document.getElementById('stock-qty').value);
      if (!qty || qty <= 0) { errEl.textContent = 'Enter a valid quantity.'; return; }

      try {
        await api("POST", `/admin/medicines/${currentStockMedicineId}/batches`, {
          quantity: qty,
          expiry_date: document.getElementById('stock-expiry').value || null,
          batch_number: document.getElementById('stock-batch-number').value.trim()
        });
        toast('Stock added.', 'success');
        closeAddStockModal();
        loadStockMedicines();
      } catch (e) { errEl.textContent = e.message; }
    }

    async function openBatchesModal(medicineId, medicineName) {
      document.getElementById('batches-medicine-name').textContent = medicineName;
      document.getElementById('batches-list').innerHTML = '<p style="color:var(--slate)">Loading…</p>';
      document.getElementById('modal-batches').classList.add('open');
      try {
        const batches = await api("GET", `/admin/medicines/${medicineId}/batches`);
        renderBatches(batches, medicineId, medicineName);
      } catch (e) {
        document.getElementById('batches-list').innerHTML = `<p style="color:var(--danger)">${e.message}</p>`;
      }
    }

    function renderBatches(batches, medicineId, medicineName) {
      const el = document.getElementById('batches-list');
      if (!batches.length) {
        el.innerHTML = '<p style="color:var(--slate-light);padding:12px 0">No stock batches recorded yet.</p>';
        return;
      }
      const today = new Date().toISOString().slice(0, 10);
      el.innerHTML = batches.map(b => {
        let badge = '';
        if (b.expiry_date) {
          const daysLeft = Math.floor((new Date(b.expiry_date) - new Date(today)) / 86400000);
          if (daysLeft < 0) badge = '<span class="badge badge-red">Expired</span>';
          else if (daysLeft <= 30) badge = `<span class="badge badge-amber">${daysLeft}d left</span>`;
        }
        return `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap">
            <div>
              <strong>${b.quantity} units</strong>
              ${b.batch_number ? ` · Lot ${sanitize(b.batch_number)}` : ''}
              <div style="font-size:12px;color:var(--slate)">Expiry: ${b.expiry_date || 'Not set'} · Received: ${b.received_date || '—'}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              ${badge}
              <button class="btn btn-outline btn-sm" onclick="deleteBatch(${b.id}, ${medicineId}, '${medicineName.replace(/'/g, "\\'")}')">Remove</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function deleteBatch(batchId, medicineId, medicineName) {
      try {
        await api("DELETE", `/admin/medicines/batches/${batchId}`);
        toast('Batch removed.', 'success');
        openBatchesModal(medicineId, medicineName);
        loadStockMedicines();
      } catch (e) { toast(e.message, 'error'); }
    }

    function closeBatchesModal() {
      document.getElementById('modal-batches').classList.remove('open');
    }

    loadPharmAttendance();
    loadQueue();
    switchPharmacyTab('queue');
  </script>
</body>

</html>
